<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>413 – Parkway | TfL Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacOSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
    margin: 0;
    padding: 20px;
    padding-bottom: 220px;
    min-height: 100vh;
    transition: background-color 0.8s ease;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  h1 {
    font-size: 26px;
    margin: 0;
  }
  .bus-line {
    margin: 20px 0;
  }
  .bus {
    font-size: 48px;
    font-weight: bold;
  }
  .change-markers {
    margin-top: 6px;
    display: flex;
    justify-content: center;
    gap: 6px;
    min-height: 28px;
  }
  .marker {
    width: 28px;
    height: 28px;
    line-height: 28px;
    font-size: 18px;
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
  }
  .marker.same   { background: #444; color: #aaa; }
  .marker.up     { background: #8B0000; color: #fff; }
  .marker.down   { background: #006400; color: #fff; }
  .warning {
    font-size: 28px;
    color: #ff4444;
    margin-left: 12px;
    align-self: center;
  }
  .tube-critical, .swr-status {
    margin: 16px 0;
    padding: 12px;
    border-radius: 8px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tube-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    margin: 4px 0;
    cursor: pointer;
  }
  .tube-line:hover { opacity: 0.85; }
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-content {
    background: #111;
    padding: 24px;
    border-radius: 12px;
    max-width: 90%;
    width: 420px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal.show { display: flex; }
  .icon-btn {
    background: transparent;
    border: none;
    color: #fff;
    font-size: 24px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 12px;
    transition: background 0.2s;
  }
  .icon-btn:hover, .icon-btn:focus {
    background: rgba(255,255,255,0.15);
  }
  button {
    padding: 10px 14px;
    font-size: 15px;
    background-color: #007ACC;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  button:hover { background-color: #005f99; }

  .bg-red    { background-color: #8B0000; }
  .bg-amber  { background-color: #FF8C00; }
  .bg-green  { background-color: #32CD32; }
  .bg-yellow { background-color: #FFD700; }

  .icon { width: 40px; height: 40px; }
  .progress-container {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 8px;
    background: rgba(255,255,255,0.15);
    z-index: 10;
  }
  .progress-bar {
    height: 100%;
    width: 100%;
    background: rgba(255,255,255,0.7);
    transform-origin: left;
    animation: countdown 15s linear forwards;
  }
  @keyframes countdown {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }
  #graphContainer {
    position: fixed;
    bottom: 20px;
    left: 10px;
    right: 10px;
    height: 160px;
    background: rgba(0,0,0,0.6);
    border-radius: 8px;
    padding: 10px;
    box-sizing: border-box;
    transition: opacity 0.3s ease, height 0.3s ease, padding 0.3s ease;
  }
  #graphContainer.hidden {
    opacity: 0;
    height: 0;
    padding: 0;
    margin: 0;
    pointer-events: none;
  }
</style>
</head>
<body class="bg-red">

<header>
  <div class="header-left">
    <svg class="icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="fill:#ff0000;">
      <path d="M480 192H32c-17.7 0-32 14.3-32 32v96c0 17.7 14.3 32 32 32h448c17.7 0 32-14.3 32-32v-96c0-17.7-14.3-32-32-32zM96 352c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32zm320 0c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32zM480 96H32C14.3 96 0 110.3 0 128v32c0 17.7 14.3 32 32 32h448c17.7 0 32-14.3 32-32v-32c0-17.7-14.3-32-32-32z"/>
      <rect x="64" y="64" width="384" height="128" fill="#ffffff"/>
    </svg>
    <h1>Parkway → Morden (413)</h1>
  </div>

  <div style="display:flex; gap:8px;">
    <button id="toggleGraphBtn" class="icon-btn" title="Toggle graph">📊</button>
    <button id="refreshBtn" class="icon-btn" title="Refresh now">🔄</button>
  </div>
</header>

<div id="tubeCritical"></div>
<div id="swrStatus" class="swr-status" style="display:none;"></div>

<div id="buses">Loading…</div>
<div id="location" class="location">Stop location: Loading…</div>
<div id="errorMsg" class="error-msg"></div>

<button id="toggleTubeBtn" class="icon-btn" style="margin:16px auto; display:block; font-size:28px;" title="Toggle all Tube lines">📊</button>

<div id="tubeFull" style="display:none; margin:20px 0;">
  <div id="tubeLines"></div>
</div>

<div id="tubeModal" class="modal">
  <div class="modal-content">
    <h2 id="modalLineName"></h2>
    <div id="modalStatus"></div>
    <div id="modalReason" style="margin-top:12px; font-size:15px;"></div>
    <button onclick="document.getElementById('tubeModal').classList.remove('show')" style="margin-top:20px;">Close</button>
  </div>
</div>

<div id="graphContainer">
  <canvas id="etaChart"></canvas>
</div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script>
// Global variables
let etaChart;
const etaHistory = [];
const MAX_POINTS = 20;
let countdownInterval = null;
let currentBuses = [];
let previousTimes = [];
let changeHistory = [];
let consecutiveNoDecrease = 0;
let graphVisible = true;
let tubeUpdateCounter = 0;
let tubeData = null;
let swrData = null;

const lineColours = {
  "bakerloo": "#B36305", "central": "#E32017", "circle": "#FFD300", "district": "#00782A",
  "elizabeth": "#6959CD", "hammersmith-city": "#F4A261", "jubilee": "#A0A5A9", "metropolitan": "#9B0056",
  "northern": "#000000", "piccadilly": "#0019A8", "victoria": "#0098D4", "waterloo-city": "#95CDBA"
};

// Chart init
function initChart() {
  const ctx = document.getElementById('etaChart').getContext('2d');
  etaChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{
      label: 'Nearest bus ETA (seconds)',
      data: [],
      borderColor: '#4CAF50',
      backgroundColor: 'rgba(76,175,80,0.2)',
      tension: 0.3,
      fill: true,
      pointRadius: 4,
    }]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, title: {display:true, text:'Seconds', color:'#fff'}, ticks:{color:'#aaa'} },
        x: { title: {display:false}, ticks: {color:'#aaa', maxTicksLimit:8} }
      },
      plugins: { legend: {labels:{color:'#fff'}} }
    }
  });
}

// Chart update
function updateChart(seconds) {
  if (seconds === null) return;
  etaHistory.push({ time: new Date(), seconds });
  if (etaHistory.length > MAX_POINTS) etaHistory.shift();

  etaChart.data.labels = etaHistory.map(h => Math.round(h.seconds / 60) + (Math.round(h.seconds / 60) === 1 ? ' min' : ' min'));
  etaChart.data.datasets[0].data = etaHistory.map(h => h.seconds);
  etaChart.update();
}

// Time format
function formatTime(seconds) {
  if (seconds < 0) return "Due";
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins} min ${secs.toString().padStart(2,'0')} s`;
}

// Change marker
function getChangeMarker(delta) {
  if (delta > 0) return {symbol: '↑', class: 'up'};
  if (delta < 0) return {symbol: '↓', class: 'down'};
  return {symbol: '→', class: 'same'};
}

// Render buses + markers + warning
function renderBusesWithMarkers() {
  let html = "";
  let nextSeconds = null;

  currentBuses.forEach((bus, i) => {
    const timeStr = formatTime(bus.timeToStation);
    let markersHtml = "";
    let warningHtml = "";

    if (i === 0) {
      if (changeHistory.length > 0) {
        markersHtml = '<div class="change-markers">';
        changeHistory.slice(-10).forEach(ch => {
          markersHtml += `<span class="marker ${ch.class}">${ch.symbol}</span>`;
        });
        markersHtml += '</div>';
      }
      if (consecutiveNoDecrease >= 8) {
        warningHtml = '<span class="warning">⚠️</span>';
      }
    }

    html += `<div class="bus-line">
      <div class="bus">${timeStr}</div>
      ${markersHtml}
      ${warningHtml}
    </div>`;

    if (nextSeconds === null || bus.timeToStation < nextSeconds) nextSeconds = bus.timeToStation;
  });

  if (currentBuses.length === 0) {
    html = '<div class="bus">No 413 buses scheduled right now</div>';
  }

  document.getElementById("buses").innerHTML = html;
  updateBackground(nextSeconds);
}

// Countdown timer
function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    currentBuses = currentBuses.map(b => ({
      timeToStation: Math.max(0, b.timeToStation - 1)
    }));
    renderBusesWithMarkers();
  }, 1000);
}

// Progress bar reset
function resetProgressBar() {
  const bar = document.getElementById("progressBar");
  bar.style.animation = 'none';
  void bar.offsetWidth;
  bar.style.animation = 'countdown 15s linear forwards';
}

// Background color logic
function updateBackground(nextSeconds) {
  document.body.classList.remove("bg-red","bg-amber","bg-green","bg-yellow");
  if (nextSeconds == null || nextSeconds > 360) document.body.classList.add("bg-red");
  else if (nextSeconds < 120) document.body.classList.add("bg-yellow");
  else if (nextSeconds >= 270 && nextSeconds <= 360) document.body.classList.add("bg-amber");
  else document.body.classList.add("bg-green");
}

// ────────────────────────────────────────────────
//  TUBE & SWR STATUS
// ────────────────────────────────────────────────

async function fetchTubeAndSWR() {
  try {
    // Tube
    const tubeRes = await fetch("https://api.tfl.gov.uk/Line/Mode/tube/Status");
    if (tubeRes.ok) tubeData = await tubeRes.json();

    // SWR
    const swrRes = await fetch("https://api.tfl.gov.uk/Line/southwesternrailway/Status");
    if (swrRes.ok) swrData = await swrRes.json();

    renderCriticalLines();
    renderSWRStatus();
    if (document.getElementById("tubeFull").style.display !== "none") {
      renderAllTubeLines();
    }
  } catch (err) {
    console.error("Status fetch failed:", err);
  }
}

function renderCriticalLines() {
  const container = document.getElementById("tubeCritical");
  container.innerHTML = "";

  const critical = tubeData?.filter(l => l.id === "northern" || l.id === "victoria") || [];

  critical.forEach(line => {
    const status = line.lineStatuses?.[0];
    if (!status) return;
    const colour = lineColours[line.id] || "#666";
    const isDelayed = status.statusSeverity < 10;

    const div = document.createElement("div");
    div.className = "tube-critical";
    div.style.background = isDelayed ? "#8B0000" : "#006400";
    div.innerHTML = `
      <div style="width:32px;height:32px;background:${colour};border-radius:50%;"></div>
      <div style="flex:1;">
        <strong>${line.name}</strong><br>
        <span style="font-size:15px;">${status.statusSeverityDescription}</span>
        ${isDelayed && status.reason ? `<div style="font-size:13px;margin-top:4px;">${status.reason}</div>` : ''}
      </div>
    `;
    container.appendChild(div);
  });
}

function renderSWRStatus() {
  const container = document.getElementById("swrStatus");
  container.innerHTML = "";
  container.style.display = "none";

  if (!swrData || !swrData[0]) return;

  const status = swrData[0].lineStatuses?.[0];
  if (!status) return;

  const isGood = status.statusSeverity === 10;
  container.style.display = "flex";
  container.style.background = isGood ? "#006400" : "#8B0000";

  container.innerHTML = `
    <div style="width:32px;height:32px;background:#00695C;border-radius:50%;"></div>
    <div style="flex:1;">
      <strong>South Western Railway</strong><br>
      <span style="font-size:15px;">${status.statusSeverityDescription}</span>
      ${!isGood && status.reason ? `<div style="font-size:13px;margin-top:4px;">${status.reason}</div>` : ''}
    </div>
  `;
}

function renderAllTubeLines() {
  const container = document.getElementById("tubeLines");
  container.innerHTML = "";

  (tubeData || []).forEach(line => {
    const status = line.lineStatuses?.[0];
    if (!status) return;
    const colour = lineColours[line.id] || "#666";

    const div = document.createElement("div");
    div.className = "tube-line";
    div.style.borderLeft = `6px solid ${colour}`;
    div.innerHTML = `
      <strong>${line.name}</strong>
      <span style="margin-left:auto;">${status.statusSeverityDescription}</span>
    `;
    div.onclick = () => showTubeModal(line);
    container.appendChild(div);
  });
}

function showTubeModal(line) {
  const status = line.lineStatuses?.[0];
  if (!status) return;

  document.getElementById("modalLineName").textContent = line.name;
  document.getElementById("modalStatus").innerHTML = `
    <span style="background:${lineColours[line.id] || '#666'}; color:#fff; padding:4px 10px; border-radius:4px;">
      ${status.statusSeverityDescription}
    </span>
  `;
  document.getElementById("modalReason").textContent = status.reason || "No additional reason provided.";
  document.getElementById("tubeModal").classList.add("show");
}

// ────────────────────────────────────────────────
//  EVENT LISTENERS
// ────────────────────────────────────────────────

document.getElementById("toggleTubeBtn").addEventListener("click", () => {
  const full = document.getElementById("tubeFull");
  const btn = document.getElementById("toggleTubeBtn");
  if (full.style.display === "none" || full.style.display === "") {
    full.style.display = "block";
    btn.textContent
