<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #666;
    --rail-good: #22c55e;
    --rail-minor: #f59e0b;
    --rail-major: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: max(env(safe-area-inset-top), 20px) 16px 180px;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 10px;
  }
  .title-block h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; line-height: 1; }
  .title-block .subtitle { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .header-btns { display: flex; gap: 6px; }
  .icon-btn {
    background: var(--panel); border: 1px solid var(--border); color: #fff;
    font-size: 18px; width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 10px; transition: background 0.2s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.12); }

  /* ── Delay banner ── */
  #delayBanner {
    display: none; background: #c00; color: #fff;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
    letter-spacing: 0.5px; padding: 8px 14px; border-radius: 10px;
    margin-bottom: 12px; line-height: 1.5; cursor: pointer;
    animation: bannerPulse 2s ease-in-out infinite;
  }
  #delayBanner.visible { display: block; }
  #delayBanner .banner-row { display: flex; align-items: baseline; gap: 8px; }
  #delayBanner .banner-icon { font-size: 16px; }
  #delayBanner .banner-lines { flex: 1; }
  #delayBanner .banner-chip {
    display: inline-block; margin-right: 8px; padding: 2px 6px;
    background: rgba(255,255,255,0.15); border-radius: 4px; cursor: pointer;
    text-decoration: underline; text-decoration-color: rgba(255,255,255,0.4);
  }
  #delayBanner .banner-chip:hover { background: rgba(255,255,255,0.28); }
  #delayBanner .banner-tap { font-size: 10px; opacity: 0.7; margin-top: 3px; }
  @keyframes bannerPulse { 0%,100%{background:#b00000} 50%{background:#e00000} }

  /* ── Bus panel — colourised panel, not body ── */
  #busPanel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 12px;
    transition: background-color 0.4s ease, border-color 0.4s ease;
  }
  #busPanel.bus-red    { background-color: #8b0000; border-color: #aa0000; }
  #busPanel.bus-amber  { background-color: #b85000; border-color: #d06000; }
  #busPanel.bus-green  { animation: greenPulse 2s ease-in-out infinite; border-color: #009933; }
  #busPanel.bus-yellow { animation: yellowPulse 0.9s ease-in-out infinite; border-color: #ffe033; }
  @keyframes greenPulse  { 0%,100%{background-color:#007a2a} 50%{background-color:#00c44a} }
  @keyframes yellowPulse { 0%,100%{background-color:#c8960a} 50%{background-color:#ffe033} }

  .section-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 10px; }
  .bus-display { font-family: 'Bebas Neue', sans-serif; font-size: 56px; line-height: 1; }
  .bus-secondary { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  .bus-chip { font-family: 'DM Mono', monospace; font-size: 13px; background: rgba(255,255,255,0.12); border-radius: 6px; padding: 4px 8px; color: #ddd; }
  .change-markers { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
  .marker { width: 22px; height: 22px; line-height: 22px; font-size: 12px; border-radius: 5px; text-align: center; font-weight: bold; }
  .marker.same  { background: #333; color: #888; }
  .marker.up    { background: #7f1d1d; color: #fca5a5; }
  .marker.down  { background: #14532d; color: #86efac; }
  .warning { color: #ff4444; font-size: 20px; margin-left: 6px; }
  .bus-plate {
    display: inline-block; font-family: 'DM Mono', monospace; font-size: 15px;
    font-weight: 500; letter-spacing: 3px; color: #111; background: #f5c400;
    border: 2px solid #111; border-radius: 4px; padding: 3px 10px; margin-top: 6px;
    text-transform: uppercase;
  }
  .bus-footer { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 6px; }
  .error-msg  { color: #ff6666; font-size: 12px; margin-top: 4px; }

  /* ── Transit cards ── */
  .transit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .transit-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; cursor: pointer; transition: background 0.3s, border-color 0.3s;
    text-decoration: none; display: block; border-top-width: 4px;
  }
  .transit-card:hover { background: rgba(255,255,255,0.07); }
  .transit-card.card-delay { background: rgba(180,0,0,0.18); border-color: #c00; animation: cardAlarm 2s ease-in-out infinite; }
  @keyframes cardAlarm { 0%,100%{background:rgba(180,0,0,0.18)} 50%{background:rgba(220,0,0,0.32)} }
  .tc-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .tc-name  { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.5px; }
  .tc-status { font-size: 12px; margin-top: 4px; font-weight: 500; }
  .tc-desc   { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.3; }

  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .dot-good  { background: var(--rail-good);  box-shadow: 0 0 6px var(--rail-good); }
  .dot-minor { background: var(--rail-minor); box-shadow: 0 0 6px var(--rail-minor); }
  .dot-major { background: var(--rail-major); box-shadow: 0 0 6px var(--rail-major); }

  .rail-refresh-btn {
    background: transparent; border: none; color: rgba(255,255,255,0.4);
    font-size: 14px; cursor: pointer; padding: 0 2px; line-height: 1; transition: color 0.2s;
  }
  .rail-refresh-btn:hover { color: #fff; }

  /* ── All lines panel ── */
  #allLinesPanel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; display: none; }
  #allLinesPanel.visible { display: block; }
  .lines-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
  .line-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 8px; background: rgba(255,255,255,0.03); }
  .line-pill { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .line-name { font-size: 12px; font-weight: 500; flex: 1; }
  .last-updated { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* ── Graph ── */
  #graphContainer {
    position: fixed; bottom: 16px; left: 10px; right: 10px; height: 150px;
    background: rgba(10,10,15,0.92); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px; transition: opacity 0.3s, height 0.3s, padding 0.3s;
  }
  #graphContainer.hidden { opacity: 0; height: 0; padding: 0; pointer-events: none; }

  /* ── Progress ── */
  .progress-container { position: fixed; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.08); z-index: 10; }
  .progress-bar { height: 100%; width: 100%; background: rgba(255,255,255,0.5); transform-origin: left; animation: countdown 15s linear forwards; }
  @keyframes countdown { from{transform:scaleX(1)} to{transform:scaleX(0)} }

  /* ── Portrait: stacked ── */
  #mainLayout { display: block; }

  /* ── Landscape: 75/25 split ── */
  @media (orientation: landscape) {
    body {
      padding-top: max(env(safe-area-inset-top), 8px);
      padding-bottom: 130px;
      padding-left: max(env(safe-area-inset-left), 12px);
      padding-right: max(env(safe-area-inset-right), 12px);
    }
    #mainLayout {
      display: grid;
      grid-template-columns: 75% 25%;
      grid-template-rows: auto;
      gap: 10px;
      align-items: start;
    }
    #busPanelCol  { grid-column: 1; grid-row: 1; }
    #transitCol   { grid-column: 2; grid-row: 1; }
    #belowLayout  { grid-column: 1 / -1; grid-row: 2; }

    /* Big centred timer */
    #busPanel {
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center; min-height: 220px; padding: 20px;
    }
    .bus-display { font-size: 20vw; line-height: 1; }
    #busPanel .section-label { text-align: center; }
    #busPanel .bus-secondary  { justify-content: center; }
    #busPanel .change-markers { justify-content: center; }
    #busPanel > div:first-child { width: 100%; }

    /* Right column: stacked cards, compact */
    #transitCol { display: flex; flex-direction: column; gap: 8px; }
    #transitCol .transit-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 0; }
    #transitCol .transit-card { padding: 10px; }
    #transitCol .tc-name   { font-size: 14px; }
    #transitCol .tc-label  { font-size: 9px; }
    #transitCol .tc-status { font-size: 11px; }
    #transitCol .tc-desc   { font-size: 10px; }

    #graphContainer { height: 110px; bottom: 8px; }
  }
</style>
</head>

<body>

<header>
  <div class="title-block">
    <h1 id="pageTitle">Elm Walk → London</h1>
    <div class="subtitle" id="pageSubtitle">413 · Outbound</div>
  </div>
  <div class="header-btns">
    <button id="directionBtn" class="icon-btn" title="Switch to Return" style="font-size:20px">⇄</button>
    <button id="toggleLinesBtn" class="icon-btn" title="All tube lines">🗺️</button>
    <button id="toggleGraphBtn" class="icon-btn" title="Toggle graph">📊</button>
    <button id="refreshBtn" class="icon-btn" title="Refresh bus + tube">↺</button>
  </div>
</header>

<div id="delayBanner">
  <div class="banner-row">
    <span class="banner-icon">⚠️</span>
    <div class="banner-lines" id="bannerLines"></div>
  </div>
  <div class="banner-tap">Tap a service for details</div>
</div>

<div id="mainLayout">

  <!-- 75% left — bus -->
  <div id="busPanelCol">
    <div id="busPanel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;width:100%">
        <div class="section-label" id="busLabel" style="margin-bottom:0">🚌 Bus 413 · To Morden</div>
        <div id="busModeToggle" style="display:none;gap:4px;">
          <button onclick="setBusMode('413')" id="busToggle413"
            style="font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.18);color:#fff;cursor:pointer;font-family:'DM Mono',monospace">413</button>
          <button onclick="setBusMode('163')" id="busToggle163"
            style="font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#888;cursor:pointer;font-family:'DM Mono',monospace">163</button>
        </div>
      </div>
      <div class="bus-display" id="busDisplay">–</div>
      <div id="busPlate" class="bus-plate" style="display:none"></div>
      <div class="bus-secondary" id="busSecondary"></div>
      <div class="change-markers" id="changeMarkers"></div>
      <div class="bus-footer" id="busFooter"></div>
      <div class="error-msg" id="busError"></div>
    </div>
  </div>

  <!-- 25% right — tube + rail -->
  <div id="transitCol">
    <div class="transit-grid">
      <a class="transit-card" id="northernCard" style="border-top-color:#888;"
         href="https://tfl.gov.uk/tube-dlr-overground/status/#northern" target="_blank" rel="noopener">
        <div class="tc-label">🚇 Northern</div>
        <div class="tc-name">Morden Branch</div>
        <div class="tc-status" id="northernStatus"><span class="dot dot-minor"></span>Checking…</div>
        <div class="tc-desc" id="northernDesc"></div>
      </a>
      <a class="transit-card" id="victoriaCard" style="border-top-color:#0098D4;"
         href="https://tfl.gov.uk/tube-dlr-overground/status/#victoria" target="_blank" rel="noopener">
        <div class="tc-label">🚇 Victoria</div>
        <div class="tc-name">Victoria Line</div>
        <div class="tc-status" id="victoriaStatus"><span class="dot dot-minor"></span>Checking…</div>
        <div class="tc-desc" id="victoriaDesc"></div>
      </a>
      <a class="transit-card" id="railCard" style="border-top-color:#e05206;"
         href="https://www.journeycheck.com/swr/search?from=RAY&to=WAT" target="_blank" rel="noopener">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <div class="tc-label" style="margin-bottom:0">🚆 SW Rail</div>
          <div style="display:flex;align-items:center;gap:4px;">
            <div id="railStationToggle" style="display:none;gap:4px;">
              <button onclick="event.preventDefault();setRailStation('VXH')" id="railToggleVXH"
                style="font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.18);color:#fff;cursor:pointer;font-family:'DM Mono',monospace">VXH</button>
              <button onclick="event.preventDefault();setRailStation('WAT')" id="railToggleWAT"
                style="font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#888;cursor:pointer;font-family:'DM Mono',monospace">WAT</button>
            </div>
            <button class="rail-refresh-btn" onclick="event.preventDefault();refreshRail()" title="Refresh rail">↺</button>
          </div>
        </div>
        <div class="tc-name" id="railCardName">Raynes Pk → Waterloo</div>
        <div class="tc-status" id="railStatus"><span class="dot dot-minor"></span>Checking…</div>
        <div class="tc-desc" id="railDesc"></div>
      </a>
      <div style="display:flex;align-items:flex-end;">
        <div class="last-updated" id="railUpdated">–</div>
      </div>
    </div>
  </div>

  <!-- Full-width below in both portrait and landscape -->
  <div id="belowLayout">
    <div id="otherBusesPanel" style="display:none;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;">
      <div class="section-label">🚌 Other buses · Morden Civic Centre</div>
      <div id="otherBusesList" style="font-size:13px;color:#ccc;margin-top:4px;">Loading…</div>
    </div>
    <div id="allLinesPanel">
      <div class="section-label">All TfL Lines</div>
      <div class="lines-grid" id="linesGrid">Loading…</div>
    </div>
  </div>

</div>

<div id="graphContainer"><canvas id="etaChart"></canvas></div>
<div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

<script>
// ── Direction config ──
const DIRECTIONS = {
  outbound: {
    title:'Elm Walk → London', subtitle:'413 · Outbound',
    busLabel:'🚌 Bus 413 · To Morden', busStop:'490010849N', lineName:'413',
    checkpoint:'490009424N', checkpointName:'Morden Park Baptist Church',
    railFrom:'RAY', railTo:'WAT', railName:'Raynes Pk → Waterloo',
    journeyCheck:'https://www.journeycheck.com/swr/search?from=RAY&to=WAT',
    showOtherBuses:false, northernDirection:'southbound', victoriaDirection:'southbound',
  },
  return: {
    title:'London → Elm Walk', subtitle:'413 · Return',
    busLabel:'🚌 Bus 413 · To Raynes Park', busStop:'490010018J', lineName:'413',
    checkpoint:'490009424S', checkpointName:'Morden Park Baptist Church',
    railFrom:'VXH', railTo:'RAY', railName:'Vauxhall → Raynes Pk',
    journeyCheck:'https://www.journeycheck.com/swr/search?from=VXH&to=RAY',
    showOtherBuses:true, northernDirection:'northbound', victoriaDirection:'northbound',
  }
};

const RAIL_STATIONS = {
  VXH:{code:'VXH', name:'Vauxhall → Raynes Pk',  journeyCheck:'https://www.journeycheck.com/swr/search?from=VXH&to=RAY'},
  WAT:{code:'WAT', name:'Waterloo → Raynes Pk', journeyCheck:'https://www.journeycheck.com/swr/search?from=WAT&to=RAY'},
};

const BUS_MODES = {
  '413':{label:'🚌 Bus 413 · To Raynes Park', busStop:'490010018J', checkpoint:'490009424S', checkpointName:'Morden Park Baptist Church', lineName:'413'},
  '163':{label:'🚌 Bus 163 · From Raynes Park', busStop:'490001237G', checkpoint:null, checkpointName:null, lineName:'163'},
};

const TUBE_COLOURS = {
  'bakerloo':'#894E24','central':'#E32017','circle':'#FFD300','district':'#00782A',
  'hammersmith-city':'#F3A9BB','jubilee':'#A0A5A9','metropolitan':'#9B0056','northern':'#333333',
  'piccadilly':'#003688','victoria':'#0098D4','waterloo-city':'#95CDBA','elizabeth':'#6950A1',
  'overground':'#EE7C0E','dlr':'#00A4A7',
};

let currentDirection = 'outbound';
let returnRailStation = 'VXH';
let returnBusMode = '413';

const cfg = () => DIRECTIONS[currentDirection];

function getRailCfg() {
  if (currentDirection !== 'return') return cfg();
  const s = RAIL_STATIONS[returnRailStation];
  return {...cfg(), railFrom:s.code, railName:s.name, journeyCheck:s.journeyCheck};
}

const _p = new URLSearchParams(window.location.search);
const TAPI_ID  = _p.get('tapp_id');
const TAPI_KEY = _p.get('tapp_key');

const TUBE_LINES_URL = 'https://api.tfl.gov.uk/Line/Mode/tube/Status';

let vehiclesStillBeforeCheckpoint = new Set();
const delayState = {northern:null, victoria:null, rail:null};
let etaHistory = [], etaChart, countdownInterval = null;
let currentBuses = [], previousTimes = [], changeHistory = [], consecutiveNoDecrease = 0;
let graphVisible = true, allLinesVisible = false;
const MAX_POINTS = 20;

// ── Chart ──
function initChart() {
  etaChart = new Chart(document.getElementById('etaChart').getContext('2d'), {
    type:'line',
    data:{labels:[], datasets:[{label:'Bus ETA (s)', data:[], borderColor:'#4ade80', backgroundColor:'rgba(74,222,128,0.15)', tension:0.4, fill:true, pointRadius:3}]},
    options:{responsive:true, maintainAspectRatio:false,
      scales:{
        y:{beginAtZero:false, ticks:{color:'#666'}, grid:{color:'rgba(255,255,255,0.05)'}},
        x:{ticks:{color:'#666', maxTicksLimit:7}, grid:{display:false}}
      },
      plugins:{legend:{labels:{color:'#888', font:{size:11}}}}}
  });
}

function updateChart(s) {
  if (s === null) return;
  etaHistory.push({t:new Date(), s});
  if (etaHistory.length > MAX_POINTS) etaHistory.shift();
  etaChart.data.labels = etaHistory.map(h => Math.floor(h.s/60)+'m');
  etaChart.data.datasets[0].data = etaHistory.map(h => h.s);
  etaChart.update();
}

// ── Helpers ──
function formatTime(s) { if(s<=0)return"Due"; const m=Math.floor(s/60),r=s%60; return`${m}:${String(r).padStart(2,'0')}`; }
function getChangeMarker(d) { return d>0?{symbol:'↑',cls:'up'}:d<0?{symbol:'↓',cls:'down'}:{symbol:'→',cls:'same'}; }
function statusClass(v) { return v===10?'dot-good':v<=3?'dot-major':'dot-minor'; }
function statusText(v)  { return v===10?'Good service':v<=3?'Severe disruption':'Minor delays'; }

function isDisruptionRelevant(desc, myDir) {
  if (!desc) return false;
  const d = desc.toLowerCase();
  const opp = myDir==='northbound'?'southbound':'northbound';
  if (d.includes(opp) && !d.includes(myDir)) return false;
  return true;
}

// ── Bus card colour (panel only, not body) ──
function updateBusCard(nextSecs, vehicleId) {
  const panel = document.getElementById('busPanel');
  const before = vehicleId && vehiclesStillBeforeCheckpoint.has(vehicleId);
  panel.classList.remove('bus-red','bus-amber','bus-green','bus-yellow');
  if (nextSecs == null || nextSecs > 360)   panel.classList.add('bus-red');
  else if (nextSecs < 120)                  panel.classList.add('bus-yellow');
  else if (before || nextSecs >= 270)       panel.classList.add('bus-amber');
  else                                      panel.classList.add('bus-green');
}

// ── Delay banner ──
function updateDelayBanner() {
  const issues = [];
  if (delayState.northern?.severity < 10) issues.push({label:'Northern Line', url:delayState.northern.url});
  if (delayState.victoria?.severity < 10) issues.push({label:'Victoria Line', url:delayState.victoria.url});
  if (delayState.rail?.severity < 10)     issues.push({label:'SW Rail',       url:delayState.rail.url});
  const banner = document.getElementById('delayBanner');
  if (!issues.length) { banner.classList.remove('visible'); return; }
  document.getElementById('bannerLines').innerHTML = issues.map(i =>
    `<span class="banner-chip" onclick="event.stopPropagation();window.open('${i.url}','_blank')">🔴 ${i.label}</span>`
  ).join('');
  banner.classList.add('visible');
  banner.onclick = () => window.open(issues[0].url, '_blank');
}

// ── Progress bar ──
function resetProgressBar() {
  const b = document.getElementById('progressBar');
  b.style.animation = 'none';
  void b.offsetWidth;
  b.style.animation = 'countdown 15s linear forwards';
}

// ── Countdown (ticks bus display every second) ──
function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    currentBuses = currentBuses.map(b => ({timeToStation:Math.max(0, b.timeToStation-1), vehicleId:b.vehicleId}));
    renderBuses();
  }, 1000);
}

// ── Render buses ──
function renderBuses(busCfg) {
  busCfg = busCfg || (currentDirection==='return' ? BUS_MODES[returnBusMode] : cfg());
  const next = currentBuses.length > 0 ? currentBuses[0].timeToStation : null;
  document.getElementById('busDisplay').textContent = next !== null ? formatTime(next) : '–';

  const plate = currentBuses.length > 0 && currentBuses[0].vehicleId ? currentBuses[0].vehicleId : '';
  const pEl = document.getElementById('busPlate');
  pEl.textContent = plate;
  pEl.style.display = plate ? 'inline-block' : 'none';

  document.getElementById('busSecondary').innerHTML = currentBuses.slice(1).map(b =>
    `<span class="bus-chip">${formatTime(b.timeToStation)}${b.vehicleId ? ` · <span style="opacity:0.6;font-size:11px">${b.vehicleId}</span>` : ''}</span>`
  ).join('');

  const cm = document.getElementById('changeMarkers');
  cm.innerHTML = changeHistory.slice(-10).map(ch => `<span class="marker ${ch.cls}">${ch.symbol}</span>`).join('');
  if (consecutiveNoDecrease >= 8) cm.innerHTML += '<span class="warning">⚠️</span>';

  const nv = currentBuses.length > 0 ? currentBuses[0].vehicleId : null;
  const before = nv && vehiclesStillBeforeCheckpoint.has(nv);
  document.getElementById('busFooter').textContent =
    currentBuses.length === 0 ? `No ${busCfg.lineName} buses right now` :
    before ? `⏳ Not yet past ${busCfg.checkpointName}` :
    currentBuses.length === 1 ? '✓ Past checkpoint' :
    `✓ Past checkpoint · +${currentBuses.length-1} following`;

  updateBusCard(next, nv);
}

// ── Load bus ──
async function loadBus() {
  resetProgressBar();
  document.getElementById('busError').textContent = '';
  const busCfg = currentDirection==='return' ? BUS_MODES[returnBusMode] : cfg();
  try {
    const r = await fetch(`https://api.tfl.gov.uk/StopPoint/${busCfg.busStop}/Arrivals`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    const buses = data.filter(b => b.lineName === busCfg.lineName)
      .sort((a,b) => a.timeToStation - b.timeToStation).slice(0,3);

    if (cfg().showOtherBuses && returnBusMode === '413')
      renderOtherBuses(data.filter(b => b.lineName !== '413').sort((a,b) => a.timeToStation - b.timeToStation).slice(0,6));
    document.getElementById('otherBusesPanel').style.display =
      (cfg().showOtherBuses && returnBusMode === '413') ? 'block' : 'none';

    if (buses.length > 0 && previousTimes.length > 0) {
      const delta = buses[0].timeToStation - previousTimes[0];
      changeHistory.push(getChangeMarker(delta));
      if (changeHistory.length > 10) changeHistory.shift();
      consecutiveNoDecrease = delta > 0 ? consecutiveNoDecrease + 1 : 0;
    } else { changeHistory = []; consecutiveNoDecrease = 0; }

    previousTimes = buses.map(b => b.timeToStation);
    currentBuses  = buses.map(b => ({timeToStation:b.timeToStation, vehicleId:b.vehicleId}));
    renderBuses(busCfg);
    updateChart(buses.length > 0 ? buses[0].timeToStation : null);
    startCountdown();

    // Checkpoint
    if (busCfg.checkpoint) {
      try {
        const rc = await fetch(`https://api.tfl.gov.uk/StopPoint/${busCfg.checkpoint}/Arrivals`);
        if (rc.ok)
          vehiclesStillBeforeCheckpoint = new Set(
            (await rc.json()).filter(b => b.lineName === busCfg.lineName).map(b => b.vehicleId)
          );
      } catch(e) { vehiclesStillBeforeCheckpoint = new Set(); }
    } else { vehiclesStillBeforeCheckpoint = new Set(); }
    renderBuses(busCfg);
  } catch(err) {
    document.getElementById('busError').textContent = `Bus error: ${err.message}`;
  }
}

function renderOtherBuses(buses) {
  const el = document.getElementById('otherBusesList'); if (!el) return;
  if (!buses.length) { el.textContent = 'No other buses right now'; return; }
  el.innerHTML = buses.map(b => {
    const m = Math.floor(b.timeToStation/60), s = b.timeToStation%60;
    return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
      <span><strong style="font-size:15px">${b.lineName}</strong> <span style="color:#888;font-size:12px">→ ${b.destinationName}</span></span>
      <span style="font-family:'DM Mono',monospace;font-size:13px">${m>0?m+'m ':''} ${s}s</span></div>`;
  }).join('');
}

// ── Render line status ──
function renderLineStatus(statusId, descId, severity, desc, cardId, serviceKey, serviceUrl) {
  const el = document.getElementById(statusId), dc = document.getElementById(descId), card = cardId ? document.getElementById(cardId) : null;
  if (!el) return;
  el.innerHTML = `<span class="dot ${statusClass(severity)}"></span>${statusText(severity)}`;
  if (dc) dc.textContent = desc || '';
  if (card) card.classList.toggle('card-delay', severity < 10);
  if (serviceKey) { delayState[serviceKey] = {severity, url:serviceUrl||cfg().journeyCheck}; updateDelayBanner(); }
}

// ── Rail: manual refresh only (preserves API quota) ──
function renderRailUnknown() {
  const el = document.getElementById('railStatus'), dc = document.getElementById('railDesc'), card = document.getElementById('railCard');
  if (el) el.innerHTML = `<span class="dot dot-minor"></span>Tap to check`;
  if (dc) dc.textContent = 'Tap for live trains';
  if (card) { card.classList.remove('card-delay'); card.href = getRailCfg().journeyCheck; }
  delayState.rail = null; updateDelayBanner();
}

async function loadRailFromTransportAPI() {
  const {railFrom, railTo, journeyCheck} = getRailCfg();
  const url = `https://transportapi.com/v3/uk/train/station/${railFrom}/live.json?app_id=${TAPI_ID}&app_key=${TAPI_KEY}&calling_at=${railTo}&train_status=passenger&type=departure`;
  const r = await fetch(url);
  if (r.status === 429 || r.status === 403) throw new Error('429');
  if (!r.ok) throw new Error('API ' + r.status);
  const data = await r.json();
  const svcs = (data.departures?.all || []).filter(s => s.operator === 'SW');
  if (!svcs.length) { renderLineStatus('railStatus','railDesc',10,'No SWR departures found','railCard','rail',journeyCheck); return; }
  const nx = svcs[0], status=nx.status, aimed=nx.aimed_departure_time, expected=nx.expected_departure_time, mins=nx.best_departure_estimate_mins;
  let severity, desc;
  if (status === 'CANCELLED') { severity=1; desc=`${aimed} CANCELLED`; }
  else if (status === 'LATE') {
    const toM = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
    const delay = expected ? toM(expected)-toM(aimed) : '?';
    severity = delay>=10?3:6;
    desc = `${aimed} — ${delay} min late${mins!=null?` · ${mins} min`:''}`;
  } else if (status === 'EARLY') {
    severity=10; desc=`${aimed} — early · ${mins} min`;
  } else {
    severity=10; desc=`${aimed} — on time${mins!=null?` · ${mins} min`:''}`;
  }
  renderLineStatus('railStatus','railDesc',severity,desc,'railCard','rail',journeyCheck);
  document.getElementById('railCard').href = journeyCheck;
  document.getElementById('railUpdated').textContent = 'Rail: ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

// refreshRail — called once on load, and by the ↺ button on the rail card only
async function refreshRail() {
  document.getElementById('railStatus').innerHTML = '<span class="dot dot-minor"></span>Checking…';
  document.getElementById('railDesc').textContent = '';
  if (TAPI_ID && TAPI_KEY) {
    try { await loadRailFromTransportAPI(); }
    catch(err) {
      if (err.message.includes('429')) {
        renderLineStatus('railStatus','railDesc',5,'⚠️ Daily quota reached — tap for trains','railCard','rail',getRailCfg().journeyCheck);
        document.getElementById('railCard').href = 'https://www.nationalrail.co.uk/live-trains/departures/raynes-park/london-waterloo/';
      } else { renderRailUnknown(); }
    }
  } else { renderRailUnknown(); }
}

// ── Tube only — no rail inside here ──
async function loadTubeAndRail() {
  try {
    const r = await fetch(TUBE_LINES_URL); if (!r.ok) throw new Error();
    const lines = await r.json();

    const northern = lines.find(l => l.id === 'northern');
    if (northern?.lineStatuses?.length) {
      const s = northern.lineStatuses[0], fd = s.disruption?.description||'', myDir = cfg().northernDirection;
      const relevant = s.statusSeverity===10 || isDisruptionRelevant(fd, myDir);
      const severity = relevant ? s.statusSeverity : 10;
      const short = fd.length>80 ? fd.slice(0,80)+'…' : fd;
      renderLineStatus('northernStatus','northernDesc', severity,
        relevant ? short : `(${myDir==='northbound'?'Southbound':'Northbound'} only)`,
        'northernCard','northern','https://tfl.gov.uk/tube/line/northern/status');
    }

    const victoria = lines.find(l => l.id === 'victoria');
    if (victoria?.lineStatuses?.length) {
      const s = victoria.lineStatuses[0], fd = s.disruption?.description||'', myDir = cfg().victoriaDirection;
      const relevant = s.statusSeverity===10 || isDisruptionRelevant(fd, myDir);
      const severity = relevant ? s.statusSeverity : 10;
      const short = fd.length>80 ? fd.slice(0,80)+'…' : fd;
      renderLineStatus('victoriaStatus','victoriaDesc', severity,
        relevant ? short : `(${myDir==='northbound'?'Southbound':'Northbound'} only)`,
        'victoriaCard','victoria','https://tfl.gov.uk/tube/line/victoria/status');
    }

    if (allLinesVisible) renderAllLines(lines);
    window._allTubeLines = lines;
    document.getElementById('railUpdated').textContent = 'Tube: ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  } catch(err) {
    ['northernStatus','victoriaStatus'].forEach(id => {
      const el = document.getElementById(id); if (el) el.innerHTML = `<span class="dot dot-minor"></span>Unavailable`;
    });
  }
  // Rail is NOT touched here — manual only
}

function renderAllLines(lines) {
  const grid = document.getElementById('linesGrid');
  if (!lines?.length) { grid.textContent='No data'; return; }
  grid.innerHTML = lines.map(l => {
    const c = TUBE_COLOURS[l.id]||'#888', sev = l.lineStatuses?.[0]?.statusSeverity??10;
    return `<div class="line-row"><div class="line-pill" style="background:${c};border:1px solid rgba(255,255,255,0.15)"></div><div class="line-name">${l.name}</div><span class="dot ${statusClass(sev)}" style="margin:0"></span></div>`;
  }).join('');
}

// ── Rail station toggle ──
function setRailStation(code) {
  returnRailStation = code;
  ['VXH','WAT'].forEach(c => {
    const b = document.getElementById('railToggle'+c);
    b.style.background   = c===code ? 'rgba(255,255,255,0.18)' : 'transparent';
    b.style.color        = c===code ? '#fff' : '#888';
    b.style.borderColor  = c===code ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.1)';
  });
  const rc = getRailCfg();
  document.getElementById('railCardName').textContent = rc.railName;
  document.getElementById('railCard').href = rc.journeyCheck;
  delayState.rail = null; updateDelayBanner();
  refreshRail();
}

// ── Bus mode toggle ──
function setBusMode(mode) {
  returnBusMode = mode;
  const bm = BUS_MODES[mode];
  document.getElementById('busLabel').textContent = bm.label;
  ['413','163'].forEach(m => {
    const b = document.getElementById('busToggle'+m);
    b.style.background  = m===mode ? 'rgba(255,255,255,0.18)' : 'transparent';
    b.style.color       = m===mode ? '#fff' : '#888';
    b.style.borderColor = m===mode ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.1)';
  });
  currentBuses=[]; previousTimes=[]; changeHistory=[]; consecutiveNoDecrease=0;
  vehiclesStillBeforeCheckpoint = new Set();
  loadBus();
}

// ── Direction switch ──
function switchDirection() {
  currentDirection = currentDirection==='outbound' ? 'return' : 'outbound';
  const isReturn = currentDirection==='return', c = cfg();
  returnRailStation='VXH'; returnBusMode='413';
  document.getElementById('pageTitle').textContent    = c.title;
  document.getElementById('pageSubtitle').textContent = c.subtitle;
  document.getElementById('directionBtn').title = isReturn ? 'Switch to Outbound' : 'Switch to Return';
  document.getElementById('railStationToggle').style.display = isReturn ? 'flex' : 'none';
  document.getElementById('busModeToggle').style.display     = isReturn ? 'flex' : 'none';
  if (isReturn) { setRailStation('VXH'); setBusMode('413'); }
  else {
    document.getElementById('busLabel').textContent     = c.busLabel;
    document.getElementById('railCardName').textContent = c.railName;
    document.getElementById('railCard').href            = c.journeyCheck;
  }
  currentBuses=[]; previousTimes=[]; changeHistory=[]; consecutiveNoDecrease=0;
  vehiclesStillBeforeCheckpoint = new Set();
  delayState.rail=null; delayState.northern=null; delayState.victoria=null; updateDelayBanner();
  ['railStatus','northernStatus','victoriaStatus'].forEach(id => {
    const el = document.getElementById(id); if (el) el.innerHTML='<span class="dot dot-minor"></span>Checking…';
  });
  ['railDesc','northernDesc','victoriaDesc'].forEach(id => {
    const el = document.getElementById(id); if (el) el.textContent='';
  });
  loadBus(); loadTubeAndRail(); refreshRail();
}

// ── UI toggles ──
document.getElementById('toggleGraphBtn').addEventListener('click', () => {
  graphVisible = !graphVisible;
  document.getElementById('graphContainer').classList.toggle('hidden', !graphVisible);
  document.getElementById('toggleGraphBtn').textContent = graphVisible ? '📉' : '📊';
});
document.getElementById('toggleLinesBtn').addEventListener('click', () => {
  allLinesVisible = !allLinesVisible;
  document.getElementById('allLinesPanel').classList.toggle('visible', allLinesVisible);
  document.getElementById('toggleLinesBtn').textContent = allLinesVisible ? '🗺' : '🗺️';
  if (allLinesVisible && window._allTubeLines) renderAllLines(window._allTubeLines);
  else if (allLinesVisible) loadTubeAndRail();
});
document.getElementById('directionBtn').addEventListener('click', switchDirection);
document.getElementById('refreshBtn').addEventListener('click', () => { loadBus(); loadTubeAndRail(); });

async function requestWakeLock() {
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {}
}

// ── Init ──
initChart();
document.getElementById('pageTitle').textContent    = cfg().title;
document.getElementById('pageSubtitle').textContent = cfg().subtitle;
document.getElementById('busLabel').textContent     = cfg().busLabel;
document.getElementById('railCardName').textContent = cfg().railName;
document.getElementById('railStationToggle').style.display = 'none';
document.getElementById('busModeToggle').style.display     = 'none';

loadBus();
loadTubeAndRail();
refreshRail();  // once on load only — no interval

setInterval(loadBus, 15000);          // bus: every 15s
setInterval(loadTubeAndRail, 60000);  // tube only: every 60s — rail NOT included

requestWakeLock();
document.addEventListener('visibilitychange', () => { if (!document.hidden) requestWakeLock(); });
</script>
</body>
