<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>413 – Parkway</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  font-family: -apple-system, system-ui;
  background: #000;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 20px;
  padding-bottom: 180px; /* more space for taller graph + thicker bar */
  transition: background-color 0.8s ease;
  position: relative;
  min-height: 100vh;
}
h1 { 
  font-size: 24px; 
  margin-bottom: 10px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 10px;
}
.bus {
  font-size: 48px;
  margin: 15px 0;
  font-weight: bold;
}
.small {
  color: #aaa;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}
.location, .error-msg {
  margin-top: 8px;
  font-size: 13px;
  color: #ccc;
}
.error-msg { color: #ff6666; }
button {
  margin: 12px 8px;
  padding: 10px 20px;
  font-size: 16px;
  background-color: #007ACC;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
button:hover {
  background-color: #005f99;
}

/* Color classes */
.bg-red    { background-color: #8B0000; }
.bg-amber  { background-color: #FF8C00; }
.bg-green  { background-color: #006400; }

/* Icon sizing */
.icon { width: 32px; height: 32px; }
.update-icon { width: 16px; height: 16px; fill: #aaa; }

/* Progress bar - thicker */
.progress-container {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: rgba(255, 255, 255, 0.15);
  z-index: 10;
}
.progress-bar {
  height: 100%;
  width: 100%;
  background: rgba(255, 255, 255, 0.7);
  transform-origin: left;
  animation: countdown 15s linear forwards;
}
@keyframes countdown {
  from { transform: scaleX(1); }
  to   { transform: scaleX(0); }
}

/* Graph - taller */
#graphContainer {
  position: fixed;
  bottom: 20px;
  left: 10px;
  right: 10px;
  height: 160px;
  background: rgba(0,0,0,0.6);
  border-radius: 8px;
  padding: 10px;
  box-sizing: border-box;
}
</style>
</head>

<body class="bg-red">

<!-- Red double-decker bus icon -->
<svg class="icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="fill: #ff0000;">
  <path d="M480 192H32c-17.7 0-32 14.3-32 32v96c0 17.7 14.3 32 32 32h448c17.7 0 32-14.3 32-32v-96c0-17.7-14.3-32-32-32zM96 352c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32zm320 0c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32zM480 96H32C14.3 96 0 110.3 0 128v32c0 17.7 14.3 32 32 32h448c17.7 0 32-14.3 32-32v-32c0-17.7-14.3-32-32-32z"/>
  <rect x="64" y="64" width="384" height="128" fill="#ffffff"/>
</svg>

<h1>Parkway → Morden (413)</h1>

<div id="buses">Loading…</div>
<div id="location" class="location">Stop location: Loading…</div>
<div id="errorMsg" class="error-msg"></div>

<button id="refreshBtn">Refresh Now</button>

<div id="graphContainer">
  <canvas id="etaChart"></canvas>
</div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script>
// Chart.js setup
let etaChart;
const etaHistory = [];
const MAX_POINTS = 20;

function initChart() {
  const ctx = document.getElementById('etaChart').getContext('2d');
  etaChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Nearest bus ETA (seconds)',
        data: [],
        borderColor: '#4CAF50',
        backgroundColor: 'rgba(76, 175, 80, 0.2)',
        tension: 0.3,
        fill: true,
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { 
          beginAtZero: true, 
          title: { display: true, text: 'Seconds', color: '#fff' }, 
          ticks: { color: '#aaa' } 
        },
        x: { title: { display: false }, ticks: { color: '#aaa', maxTicksLimit: 6 } }
      },
      plugins: {
        legend: { labels: { color: '#fff' } }
      }
    }
  });
}

function updateChart(seconds) {
  if (seconds === null) return;
  
  etaHistory.push({ time: new Date(), seconds });
  if (etaHistory.length > MAX_POINTS) etaHistory.shift();

  etaChart.data.labels = etaHistory.map((_, i) => `${i + 1}`);
  etaChart.data.datasets[0].data = etaHistory.map(h => h.seconds);
  etaChart.update();
}

function resetProgressBar() {
  const bar = document.getElementById("progressBar");
  bar.style.animation = 'none';
  void bar.offsetWidth; // trigger reflow
  bar.style.animation = 'countdown 15s linear forwards';
}

function formatTime(seconds) {
  if (seconds < 0) return "0 min 0 s";
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins} min ${secs} s`;
}

const stop = "490010849N";
const url = `https://api.tfl.gov.uk/StopPoint/${stop}/Arrivals`;

let wakeLock = null;
async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      wakeLock = await navigator.wakeLock.request("screen");
      console.log("Wake lock active.");
    }
  } catch (err) {
    console.error("Wake lock failed:", err);
  }
}

function updateBackground(nextSeconds) {
  const body = document.body;
  body.classList.remove("bg-red", "bg-amber", "bg-green");

  if (nextSeconds === null || nextSeconds > 360) {
    body.classList.add("bg-red");
  } else if (nextSeconds >= 270 && nextSeconds <= 360) {
    body.classList.add("bg-amber");
  } else {
    body.classList.add("bg-green");
  }
}

async function load(force = false) {
  const errorEl = document.getElementById("errorMsg");
  errorEl.textContent = "";

  resetProgressBar();

  try {
    const r = await fetch(url);
    if (!r.ok) {
      throw new Error(`API ${r.status} ${r.statusText}`);
    }
    const data = await r.json();

    const buses = data
      .filter(b => b.lineName === "413")
      .sort((a, b) => a.timeToStation - b.timeToStation)
      .slice(0, 3);

    let html = "";
    let nextSeconds = null;
    let lat = null;
    let lon = null;

    if (data.length > 0) {
      lat = data[0].latitude?.toFixed(6);
      lon = data[0].longitude?.toFixed(6);
    }

    buses.forEach((bus) => {
      const sec = bus.timeToStation;
      html += `<div class="bus">${formatTime(sec)}</div>`;

      if (nextSeconds === null || sec < nextSeconds) nextSeconds = sec;
    });

    if (buses.length === 0) {
      html = '<div class="bus">No 413 buses scheduled right now</div>';
      if (data.length > 0) {
        html += '<div class="small">(Other routes may be serving this stop)</div>';
      }
    }

    document.getElementById("buses").innerHTML = html;

    const locEl = document.getElementById("location");
    if (lat && lon) {
      locEl.textContent = `Stop location: ${lat}, ${lon}`;
    } else {
      locEl.textContent = "Stop location: Not available";
    }

    updateBackground(nextSeconds);

    updateChart(nextSeconds);

  } catch (err) {
    console.error(err);
    document.getElementById("buses").innerHTML = "Error loading arrivals";
    document.getElementById("location").textContent = "Stop location: Unknown";
    errorEl.textContent = `Failed: ${err.message}. TfL may be busy – retrying soon.`;
  }
}

// Init chart
initChart();

// Auto-refresh every 15 seconds
load();
const refreshInterval = setInterval(() => load(), 15000);

// Manual refresh button
document.getElementById("refreshBtn").addEventListener("click", () => {
  load(true);
});

requestWakeLock();
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) {
    requestWakeLock();
  }
});
</script>

</body>
</html>
