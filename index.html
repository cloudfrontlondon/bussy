<h1>Parkway → Morden (413)</h1>

<div id="buses">Loading…</div>

<button id="soundToggleButton">Sound OFF</button>

<!-- Inline SVG for clock icon (simple white/gray) -->

<script>
const stop = "490010849N";
const url = `https://api.tfl.gov.uk/StopPoint/${stop}/Arrivals`;

const beep = new Audio("https://www.soundjay.com/button/beep-07.wav");
beep.load();

let soundEnabled = false;

let wakeLock = null;
async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      wakeLock = await navigator.wakeLock.request("screen");
      console.log("Wake lock active.");
    }
  } catch (err) {
    console.error("Wake lock failed:", err);
  }
}

function updateBackground(nextSeconds) {
  const body = document.body;
  body.classList.remove("bg-red", "bg-amber", "bg-green");

  if (nextSeconds === null || nextSeconds > 360) {
    body.classList.add("bg-red");
  } else if (nextSeconds >= 270 && nextSeconds <= 360) {
    body.classList.add("bg-amber");
  } else {
    body.classList.add("bg-green"); // covers 150–269 and <150
  }
}

async function load() {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error("API error");
    const data = await r.json();

    const buses = data
      .filter(b => b.lineName === "413")
      .sort((a, b) => a.timeToStation - b.timeToStation)
      .slice(0, 3);

    let html = "";
    let shouldBeep = false;
    let nextSeconds = null;

    buses.forEach((bus, i) => {
      const sec = bus.timeToStation;
      const min = Math.round(sec / 60);
      html += `<div class="bus">${min} min</div>`;

      if (i === 0) nextSeconds = sec;
      if (sec < 300) shouldBeep = true;
    });

    if (buses.length === 0) {
      html = '<div class="bus">No 413 buses right now</div>';
      nextSeconds = null;
    }

    html += `<div class="small">
      <svg class="update-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.
