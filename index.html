<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>413 – Elm Walk ↔ London</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --rail-good: #22c55e;
    --rail-minor: #f59e0b;
    --rail-major: #ef4444;
    --bg: #0a0a0f;
    --panel: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px 16px 180px;
    transition: background-color 0.8s ease;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 10px;
  }
  .title-block h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .title-block .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-btns { display: flex; gap: 6px; }
  .icon-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: #fff;
    font-size: 18px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.2s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.12); }

  #busPanel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .bus-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    transition: color 0.5s;
  }
  .bus-secondary { display: flex; gap: 10px; margin-top: 8px; }
  .bus-chip {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: rgba(255,255,255,0.07);
    border-radius: 6px;
    padding: 4px 8px;
    color: #ccc;
  }
  .change-markers { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
  .marker {
    width: 22px; height: 22px;
    line-height: 22px;
    font-size: 12px;
    border-radius: 5px;
    text-align: center;
    font-weight: bold;
  }
  .marker.same  { background: #333; color: #888; }
  .marker.up    { background: #7f1d1d; color: #fca5a5; }
  .marker.down  { background: #14532d; color: #86efac; }
  .warning { color: #ff4444; font-size: 20px; margin-left: 6px; }
  .bus-plate {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 3px;
    color: #111;
    background: #f5c400;
    border: 2px solid #111;
    border-radius: 4px;
    padding: 3px 10px;
    margin-top: 6px;
    min-height: 18px;
    text-transform: uppercase;
  }
  .bus-footer { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .transit-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .transit-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s;
    text-decoration: none;
    display: block;
    border-top-width: 4px;
  }
  .transit-card:hover { background: rgba(255,255,255,0.07); }
  .transit-card.card-delay {
    background: rgba(180, 0, 0, 0.18);
    border-color: #c00;
    animation: cardAlarm 2s ease-in-out infinite;
  }
  @keyframes cardAlarm {
    0%, 100% { background: rgba(180,0,0,0.18); }
    50%       { background: rgba(220,0,0,0.32); }
  }
  .transit-card .tc-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .transit-card .tc-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.5px;
  }
  .transit-card .tc-status { font-size: 12px; margin-top: 4px; font-weight: 500; }
  .transit-card .tc-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.3;
  }

  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
  .dot-good  { background: var(--rail-good); box-shadow: 0 0 6px var(--rail-good); }
  .dot-minor { background: var(--rail-minor); box-shadow: 0 0 6px var(--rail-minor); }
  .dot-major { background: var(--rail-major); box-shadow: 0 0 6px var(--rail-major); }

  #allLinesPanel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
    display: none;
  }
  #allLinesPanel.visible { display: block; }
  .lines-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 10px;
  }
  .line-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
  }
  .line-pill { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .line-name { font-size: 12px; font-weight: 500; flex: 1; }

  .last-updated {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  #graphContainer {
    position: fixed;
    bottom: 16px;
    left: 10px; right: 10px;
    height: 150px;
    background: rgba(10,10,15,0.92);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    transition: opacity 0.3s, height 0.3s, padding 0.3s;
  }
  #graphContainer.hidden { opacity: 0; height: 0; padding: 0; pointer-events: none; }

  .progress-container {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.08);
    z-index: 10;
  }
  .progress-bar {
    height: 100%;
    width: 100%;
    background: rgba(255,255,255,0.5);
    transform-origin: left;
    animation: countdown 15s linear forwards;
  }
  @keyframes countdown {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }

  body { transition: background-color 0.4s ease; }
  body.bg-red    { background-color: #8b0000; animation: none; }
  body.bg-amber  { background-color: #b85000; animation: none; }
  body.bg-green  { background-color: #007a2a; animation: greenPulse 2s ease-in-out infinite; }
  body.bg-yellow { animation: yellowPulse 0.9s ease-in-out infinite; }

  @keyframes greenPulse {
    0%, 100% { background-color: #007a2a; }
    50%       { background-color: #00c44a; }
  }
  @keyframes yellowPulse {
    0%, 100% { background-color: #c8960a; }
    50%       { background-color: #ffe033; }
  }

  /* ── Delay banner ── */
  #delayBanner {
    display: none;
    background: #c00;
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 8px 14px;
    border-radius: 10px;
    margin-bottom: 12px;
    line-height: 1.5;
    animation: bannerPulse 2s ease-in-out infinite;
    cursor: pointer;
  }
  #delayBanner.visible { display: block; }
  #delayBanner .banner-row { display: flex; align-items: baseline; gap: 8px; }
  #delayBanner .banner-icon { font-size: 16px; }
  #delayBanner .banner-lines { flex: 1; }
  /* individual clickable service chips inside the banner */
  #delayBanner .banner-chip {
    display: inline-block;
    margin-right: 8px;
    padding: 2px 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: rgba(255,255,255,0.4);
  }
  #delayBanner .banner-chip:hover { background: rgba(255,255,255,0.28); }
  #delayBanner .banner-tap { font-size: 10px; opacity: 0.7; margin-top: 3px; }
  @keyframes bannerPulse {
    0%, 100% { background: #b00000; }
    50%       { background: #e00000; }
  }

  .error-msg { color: #ff6666; font-size: 12px; margin-top: 4px; }

  .tube-northern { background: #000000; border: 1px solid #555; }
  .tube-victoria { background: #0098D4; }
</style>
</head>

<body class="bg-red">

<header>
  <div class="title-block">
    <h1 id="pageTitle">Elm Walk → London</h1>
    <div class="subtitle" id="pageSubtitle">413 · Outbound</div>
  </div>
  <div class="header-btns">
    <button id="directionBtn" class="icon-btn" title="Switch to Return" style="font-size:20px">⇄</button>
    <button id="toggleLinesBtn" class="icon-btn" title="All tube lines">🗺️</button>
    <button id="toggleGraphBtn" class="icon-btn" title="Toggle graph">📊</button>
    <button id="refreshBtn" class="icon-btn" title="Refresh">↺</button>
  </div>
</header>

<!-- Delay banner — each chip links to its own service -->
<div id="delayBanner">
  <div class="banner-row">
    <span class="banner-icon">⚠️</span>
    <div class="banner-lines" id="bannerLines"></div>
  </div>
  <div class="banner-tap">Tap a service for details</div>
</div>

<!-- Bus panel -->
<div id="busPanel">
  <div class="section-label" id="busLabel">🚌 Bus 413 · To Morden</div>
  <div class="bus-display" id="busDisplay">–</div>
  <div id="busPlate" class="bus-plate"></div>
  <div class="bus-secondary" id="busSecondary"></div>
  <div class="change-markers" id="changeMarkers"></div>
  <div class="bus-footer" id="busFooter"></div>
  <div class="error-msg" id="busError"></div>
</div>

<!-- Other buses — shown in return mode only -->
<div id="otherBusesPanel" style="display:none;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;">
  <div class="section-label">🚌 Other buses · Morden Civic Centre</div>
  <div id="otherBusesList" style="font-size:13px;color:#ccc;margin-top:4px;">Loading…</div>
</div>

<div class="transit-grid">
  <a class="transit-card" id="northernCard"
     style="border-top-color: #888;"
     href="https://tfl.gov.uk/tube/stop/940GZZLUMDN/morden-underground-station"
     target="_blank" rel="noopener">
    <div class="tc-label">🚇 Northern Line</div>
    <div class="tc-name">Morden Branch</div>
    <div class="tc-status" id="northernStatus"><span class="dot dot-minor"></span>Checking…</div>
    <div class="tc-desc" id="northernDesc"></div>
  </a>
  <a class="transit-card" id="victoriaCard"
     style="border-top-color: #0098D4;"
     href="https://tfl.gov.uk/tube/line/victoria/status"
     target="_blank" rel="noopener">
    <div class="tc-label">🚇 Victoria Line</div>
    <div class="tc-name">Victoria</div>
    <div class="tc-status" id="victoriaStatus"><span class="dot dot-minor"></span>Checking…</div>
    <div class="tc-desc" id="victoriaDesc"></div>
  </a>
  <a class="transit-card" id="railCard"
     style="border-top-color: #e05206;"
     href="https://www.journeycheck.com/swr/search?from=RAY&to=WAT"
     target="_blank" rel="noopener">
    <div class="tc-label">🚆 SW Rail</div>
    <div class="tc-name" id="railCardName">Raynes Pk → Waterloo</div>
    <div class="tc-status" id="railStatus"><span class="dot dot-minor"></span>Checking…</div>
    <div class="tc-desc" id="railDesc"></div>
  </a>
  <div style="display:flex;align-items:flex-end;">
    <div class="last-updated" id="railUpdated">Rail/Tube: never updated</div>
  </div>
</div>

<div id="allLinesPanel">
  <div class="section-label">All TfL Lines</div>
  <div class="lines-grid" id="linesGrid">Loading…</div>
</div>

<div id="graphContainer">
  <canvas id="etaChart"></canvas>
</div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script>
// ── Direction config ──
const DIRECTIONS = {
  outbound: {
    title:          'Elm Walk → London',
    subtitle:       '413 · Outbound',
    busLabel:       '🚌 Bus 413 · To Morden',
    busStop:        '490010849N',
    checkpoint:     '490009424N',
    checkpointName: 'Morden Park Baptist Church',
    railFrom:       'RAY', railTo: 'WAT',
    railName:       'Raynes Pk → Waterloo',
    journeyCheck:   'https://www.journeycheck.com/swr/search?from=RAY&to=WAT',
    showOtherBuses: false,
    // Northern Line: outbound = southbound towards Morden, so alerts relevant if disruption
    // mentions southbound, morden branch, or no specific direction
    northernDirection: 'southbound',
    // Victoria Line: outbound = southbound (towards Brixton) to get to Waterloo
    victoriaDirection: 'southbound',
  },
  return: {
    title:          'London → Elm Walk',
    subtitle:       '413 · Return',
    busLabel:       '🚌 Bus 413 · To Raynes Park',
    busStop:        '490010018J',
    checkpoint:     '490009424S',
    checkpointName: 'Morden Park Baptist Church',
    railFrom:       'WAT', railTo: 'RAY',
    railName:       'Waterloo → Raynes Pk',
    journeyCheck:   'https://www.journeycheck.com/swr/search?from=WAT&to=RAY',
    showOtherBuses: true,
    // Northern Line: return = northbound from Morden to Waterloo
    northernDirection: 'northbound',
    // Victoria Line: return = northbound (Victoria → Warren St → Euston) to get to Waterloo
    victoriaDirection: 'northbound',
  }
};
let currentDirection = 'outbound';
const cfg = () => DIRECTIONS[currentDirection];

// ── Constants ──
const TUBE_LINES_URL  = 'https://api.tfl.gov.uk/Line/Mode/tube/Status';
const SW_RAIL_TFL_URL = 'https://api.tfl.gov.uk/Line/south-western-railway/Status';

const _urlParams = new URLSearchParams(window.location.search);
const TAPI_ID  = _urlParams.get('tapp_id');
const TAPI_KEY = _urlParams.get('tapp_key');

let vehiclesStillBeforeCheckpoint = new Set();

// delayState stores { severity, url } per service
const delayState = { northern: null, victoria: null, rail: null };

// ── Direction-aware disruption filtering ──
// Returns true if a disruption description is relevant to the given direction of travel.
// Strategy: if the text mentions the *opposite* direction only, suppress it.
// If it mentions our direction, or no direction at all, show it.
function isDisruptionRelevant(desc, myDirection) {
  if (!desc) return false;
  const d = desc.toLowerCase();
  const opposite = myDirection === 'northbound' ? 'southbound' : 'northbound';
  const mentionsOpposite = d.includes(opposite);
  const mentionsMine     = d.includes(myDirection);
  // If only the opposite direction is mentioned, suppress
  if (mentionsOpposite && !mentionsMine) return false;
  return true;
}

// ── Delay banner — now each chip is independently clickable ──
function updateDelayBanner() {
  const issues = [];
  if (delayState.northern && delayState.northern.severity < 10)
    issues.push({ label: 'Northern Line', url: delayState.northern.url });
  if (delayState.victoria && delayState.victoria.severity < 10)
    issues.push({ label: 'Victoria Line', url: delayState.victoria.url });
  if (delayState.rail && delayState.rail.severity < 10)
    issues.push({ label: 'SW Rail', url: delayState.rail.url });

  const banner = document.getElementById('delayBanner');
  const lines  = document.getElementById('bannerLines');

  if (issues.length === 0) {
    banner.classList.remove('visible');
    return;
  }

  // Each chip opens its own URL
  lines.innerHTML = issues.map(i =>
    `<span class="banner-chip" onclick="event.stopPropagation();window.open('${i.url}','_blank')">🔴 ${i.label}</span>`
  ).join('');
  banner.classList.add('visible');
  // Tapping the banner itself (not a chip) opens the first issue
  banner.onclick = () => window.open(issues[0].url, '_blank');
}

// Tube line colours for all-lines panel
const TUBE_COLOURS = {
  'bakerloo':           '#894E24',
  'central':            '#E32017',
  'circle':             '#FFD300',
  'district':           '#00782A',
  'hammersmith-city':   '#F3A9BB',
  'jubilee':            '#A0A5A9',
  'metropolitan':       '#9B0056',
  'northern':           '#333333',
  'piccadilly':         '#003688',
  'victoria':           '#0098D4',
  'waterloo-city':      '#95CDBA',
  'elizabeth':          '#6950A1',
  'overground':         '#EE7C0E',
  'dlr':                '#00A4A7',
};

// ── State ──
let etaHistory = [], etaChart;
const MAX_POINTS = 20;
let countdownInterval = null;
let currentBuses = [];
let previousTimes = [];
let changeHistory = [];
let consecutiveNoDecrease = 0;
let graphVisible = true;
let allLinesVisible = false;

// ── Chart ──
function initChart() {
  const ctx = document.getElementById('etaChart').getContext('2d');
  etaChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Bus ETA (s)',
        data: [],
        borderColor: '#4ade80',
        backgroundColor: 'rgba(74,222,128,0.15)',
        tension: 0.4, fill: true, pointRadius: 3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: false, ticks: { color: '#666' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        x: { ticks: { color: '#666', maxTicksLimit: 7 }, grid: { display: false } }
      },
      plugins: { legend: { labels: { color: '#888', font: { size: 11 } } } }
    }
  });
}

function updateChart(seconds) {
  if (seconds === null) return;
  etaHistory.push({ t: new Date(), s: seconds });
  if (etaHistory.length > MAX_POINTS) etaHistory.shift();
  etaChart.data.labels = etaHistory.map(h => Math.floor(h.s / 60) + 'm');
  etaChart.data.datasets[0].data = etaHistory.map(h => h.s);
  etaChart.update();
}

// ── Helpers ──
function formatTime(seconds) {
  if (seconds <= 0) return "Due";
  const m = Math.floor(seconds / 60), s = seconds % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function getChangeMarker(delta) {
  if (delta > 0) return { symbol: '↑', cls: 'up' };
  if (delta < 0) return { symbol: '↓', cls: 'down' };
  return { symbol: '→', cls: 'same' };
}

function updateBackground(nextSeconds, vehicleId) {
  document.body.classList.remove("bg-red","bg-amber","bg-green","bg-yellow");
  const beforeCheckpoint = vehicleId && vehiclesStillBeforeCheckpoint.has(vehicleId);
  if (nextSeconds == null || nextSeconds > 360) {
    document.body.classList.add("bg-red");
  } else if (nextSeconds < 120) {
    document.body.classList.add("bg-yellow");
  } else if (beforeCheckpoint) {
    document.body.classList.add("bg-amber");
  } else if (nextSeconds >= 270) {
    document.body.classList.add("bg-amber");
  } else {
    document.body.classList.add("bg-green");
  }
}

function statusClass(severityCode) {
  if (severityCode === 10) return 'dot-good';
  if (severityCode <= 3)   return 'dot-major';
  return 'dot-minor';
}
function statusText(severity) {
  if (severity === 10) return 'Good service';
  if (severity <= 3)   return 'Severe disruption';
  return 'Minor delays';
}

// ── Bus ──
function resetProgressBar() {
  const bar = document.getElementById("progressBar");
  bar.style.animation = 'none';
  void bar.offsetWidth;
  bar.style.animation = 'countdown 15s linear forwards';
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    currentBuses = currentBuses.map(b => ({
      timeToStation: Math.max(0, b.timeToStation - 1),
      vehicleId: b.vehicleId
    }));
    renderBuses();
  }, 1000);
}

function renderBuses() {
  const next = currentBuses.length > 0 ? currentBuses[0].timeToStation : null;
  document.getElementById('busDisplay').textContent = next !== null ? formatTime(next) : '–';

  const plateEl = document.getElementById('busPlate');
  if (plateEl) plateEl.textContent = currentBuses.length > 0 && currentBuses[0].vehicleId
    ? currentBuses[0].vehicleId : '';

  const sec = document.getElementById('busSecondary');
  sec.innerHTML = currentBuses.slice(1).map(b =>
    `<span class="bus-chip">${formatTime(b.timeToStation)}${b.vehicleId ? ' · <span style="opacity:0.6;font-size:11px">' + b.vehicleId + '</span>' : ''}</span>`
  ).join('');

  const cm = document.getElementById('changeMarkers');
  cm.innerHTML = changeHistory.slice(-10).map(ch =>
    `<span class="marker ${ch.cls}">${ch.symbol}</span>`
  ).join('');
  if (consecutiveNoDecrease >= 8) cm.innerHTML += '<span class="warning">⚠️</span>';

  const nearestVehicle = currentBuses.length > 0 ? currentBuses[0].vehicleId : null;
  const beforeCheckpoint = nearestVehicle && vehiclesStillBeforeCheckpoint.has(nearestVehicle);
  document.getElementById('busFooter').textContent =
    currentBuses.length === 0 ? 'No 413 buses scheduled right now' :
    beforeCheckpoint ? `⏳ Not yet past ${cfg().checkpointName}` :
    currentBuses.length === 1 ? '✓ Past checkpoint' :
    `✓ Past checkpoint · +${currentBuses.length - 1} following`;

  updateBackground(next, nearestVehicle);
}

async function loadBus() {
  resetProgressBar();
  document.getElementById('busError').textContent = '';
  try {
    const r = await fetch(`https://api.tfl.gov.uk/StopPoint/${cfg().busStop}/Arrivals`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    const buses = data
      .filter(b => b.lineName === '413')
      .sort((a,b) => a.timeToStation - b.timeToStation)
      .slice(0, 3);

    if (cfg().showOtherBuses) {
      const others = data
        .filter(b => b.lineName !== '413')
        .sort((a,b) => a.timeToStation - b.timeToStation)
        .slice(0, 6);
      renderOtherBuses(others);
    }
    document.getElementById('otherBusesPanel').style.display = cfg().showOtherBuses ? 'block' : 'none';

    if (buses.length > 0 && previousTimes.length > 0) {
      const delta = buses[0].timeToStation - previousTimes[0];
      const ch = getChangeMarker(delta);
      changeHistory.push(ch);
      if (changeHistory.length > 10) changeHistory.shift();
      consecutiveNoDecrease = delta > 0 ? consecutiveNoDecrease + 1 : 0;
    } else {
      changeHistory = []; consecutiveNoDecrease = 0;
    }
    previousTimes = buses.map(b => b.timeToStation);
    currentBuses  = buses.map(b => ({ timeToStation: b.timeToStation, vehicleId: b.vehicleId }));

    renderBuses();
    updateChart(buses.length > 0 ? buses[0].timeToStation : null);
    startCountdown();

    try {
      const rc = await fetch(`https://api.tfl.gov.uk/StopPoint/${cfg().checkpoint}/Arrivals`);
      if (rc.ok) {
        const checkpointData = await rc.json();
        vehiclesStillBeforeCheckpoint = new Set(
          checkpointData.filter(b => b.lineName === '413').map(b => b.vehicleId)
        );
      }
    } catch(e) {
      vehiclesStillBeforeCheckpoint = new Set();
    }
    renderBuses();
  } catch(err) {
    document.getElementById('busError').textContent = `Bus error: ${err.message}`;
  }
}

function renderOtherBuses(buses) {
  const el = document.getElementById('otherBusesList');
  if (!el) return;
  if (!buses.length) { el.textContent = 'No other buses right now'; return; }
  el.innerHTML = buses.map(b => {
    const mins = Math.floor(b.timeToStation / 60);
    const secs = b.timeToStation % 60;
    const time = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
    return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
      <span><strong style="font-size:15px">${b.lineName}</strong> <span style="color:#888;font-size:12px">→ ${b.destinationName}</span></span>
      <span style="font-family:'DM Mono',monospace;font-size:13px">${time}</span>
    </div>`;
  }).join('');
}

// ── Rail loaders ──
async function loadRailFromTransportAPI() {
  const { railFrom, railTo, journeyCheck } = cfg();
  const url = `https://transportapi.com/v3/uk/train/station/${railFrom}/live.json?app_id=${TAPI_ID}&app_key=${TAPI_KEY}&calling_at=${railTo}&train_status=passenger&type=departure`;
  const r = await fetch(url);
  if (r.status === 429 || r.status === 403) throw new Error('429 quota exhausted');
  if (!r.ok) throw new Error('TransportAPI ' + r.status);
  const data = await r.json();

  const services = (data.departures?.all || []).filter(s => s.operator === 'SW');

  if (!services.length) {
    renderLineStatus('railStatus', 'railDesc', 10, 'No upcoming SWR departures', 'railCard', 'rail', journeyCheck);
    return;
  }

  const next = services[0];
  const status   = next.status;
  const aimed    = next.aimed_departure_time;
  const expected = next.expected_departure_time;
  const minsAway = next.best_departure_estimate_mins;

  let severity, desc;
  if (status === 'CANCELLED') {
    severity = 1;
    desc = `${aimed} CANCELLED`;
  } else if (status === 'LATE') {
    const toMins = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
    const delay = expected ? toMins(expected) - toMins(aimed) : '?';
    severity = delay >= 10 ? 3 : 6;
    desc = `${aimed} dep — ${delay} min late${minsAway != null ? ` · ${minsAway} min away` : ''}`;
  } else if (status === 'EARLY') {
    severity = 10;
    desc = `${aimed} dep — running early · ${minsAway} min away`;
  } else {
    severity = 10;
    desc = `${aimed} dep — on time · ${minsAway != null ? minsAway + ' min away' : ''}`;
  }

  renderLineStatus('railStatus', 'railDesc', severity, desc, 'railCard', 'rail', journeyCheck);
}

async function loadRailFromTfL() {
  const r = await fetch(SW_RAIL_TFL_URL);
  if (!r.ok) throw new Error('TfL rail ' + r.status);
  const railData = await r.json();
  const line = Array.isArray(railData) ? railData[0] : railData;
  const s = line?.lineStatuses?.[0];
  const rawSeverity = s?.statusSeverity ?? 10;
  const severityDesc = (s?.statusSeverityDescription || '').toLowerCase();
  const isGood = rawSeverity === 10 && severityDesc.includes('good');
  const severity = isGood ? 10 : Math.min(rawSeverity, 5);
  const desc = s?.disruption?.description || s?.statusSeverityDescription || '';
  const short = desc.length > 90 ? desc.slice(0,90) + '…' : desc;
  renderLineStatus('railStatus', 'railDesc', severity, short, 'railCard', 'rail', cfg().journeyCheck);
}

// ── Core render function — now takes a url param for the delay banner ──
// serviceKey: 'northern' | 'victoria' | 'rail' | null
function renderLineStatus(statusId, descId, severity, desc, cardId, serviceKey, serviceUrl) {
  const el   = document.getElementById(statusId);
  const dc   = document.getElementById(descId);
  const card = cardId ? document.getElementById(cardId) : null;
  if (!el) return;

  el.innerHTML = `<span class="dot ${statusClass(severity)}"></span>${statusText(severity)}`;
  if (dc) dc.textContent = desc || '';
  if (card) card.classList.toggle('card-delay', severity < 10);

  // Track for banner — store severity + the correct link for this direction
  if (serviceKey) {
    delayState[serviceKey] = { severity, url: serviceUrl || cfg().journeyCheck };
    updateDelayBanner();
  }
}

async function loadTubeAndRail() {
  try {
    const r = await fetch(TUBE_LINES_URL);
    if (!r.ok) throw new Error('Tube API ' + r.status);
    const lines = await r.json();

    // ── Northern Line ──
    const northern = lines.find(l => l.id === 'northern');
    if (northern && northern.lineStatuses?.length) {
      const s = northern.lineStatuses[0];
      const fullDesc = s.disruption?.description || '';
      const myDir    = cfg().northernDirection;
      const relevant = s.statusSeverity === 10 || isDisruptionRelevant(fullDesc, myDir);
      const severity = relevant ? s.statusSeverity : 10; // suppress if opposite direction only
      const short    = fullDesc.length > 80 ? fullDesc.slice(0,80) + '…' : fullDesc;
      // Append direction tag if we're suppressing or showing a directional disruption
      const displayDesc = !relevant ? `(${myDir === 'northbound' ? 'Southbound' : 'Northbound'} only — not your direction)` : short;

      renderLineStatus(
        'northernStatus', 'northernDesc',
        severity, displayDesc,
        'northernCard', 'northern',
        'https://tfl.gov.uk/tube/line/northern/status'
      );
      document.getElementById('northernCard').href = 'https://tfl.gov.uk/tube/line/northern/status';
    }

    // ── Victoria Line ──
    const victoria = lines.find(l => l.id === 'victoria');
    if (victoria && victoria.lineStatuses?.length) {
      const s = victoria.lineStatuses[0];
      const fullDesc = s.disruption?.description || '';
      const myDir    = cfg().victoriaDirection;
      const relevant = s.statusSeverity === 10 || isDisruptionRelevant(fullDesc, myDir);
      const severity = relevant ? s.statusSeverity : 10;
      const short    = fullDesc.length > 80 ? fullDesc.slice(0,80) + '…' : fullDesc;
      const displayDesc = !relevant ? `(${myDir === 'northbound' ? 'Southbound' : 'Northbound'} only — not your direction)` : short;

      renderLineStatus(
        'victoriaStatus', 'victoriaDesc',
        severity, displayDesc,
        'victoriaCard', 'victoria',
        'https://tfl.gov.uk/tube/line/victoria/status'
      );
      document.getElementById('victoriaCard').href = 'https://tfl.gov.uk/tube/line/victoria/status';
    }

    if (allLinesVisible) renderAllLines(lines);
    window._allTubeLines = lines;

  } catch(err) {
    ['northernStatus','victoriaStatus'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = `<span class="dot dot-minor"></span>Unavailable`;
    });
  }

  // ── SW Rail ──
  try {
    if (TAPI_ID && TAPI_KEY) {
      await loadRailFromTransportAPI();
    } else {
      await loadRailFromTfL();
    }
  } catch(err) {
    try {
      await loadRailFromTfL();
      document.getElementById('railDesc').textContent += ' (TransportAPI unavailable — using TfL)';
    } catch(err2) {
      document.getElementById('railStatus').innerHTML = `<span class="dot dot-minor"></span>Tap to check`;
      document.getElementById('railDesc').textContent = err.message?.includes('429') || err.message?.includes('403')
        ? '⚠️ Daily API quota reached — tap for live trains'
        : 'Could not load rail data';
      // Always use direction-correct journeycheck link
      document.getElementById('railCard').href = cfg().journeyCheck;
      // Update banner with correct URL even in error state
      if (delayState.rail) delayState.rail.url = cfg().journeyCheck;
    }
  }

  document.getElementById('railUpdated').textContent =
    'Rail/Tube: ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

// ── All Lines Panel ──
function renderAllLines(lines) {
  const grid = document.getElementById('linesGrid');
  if (!lines || !lines.length) { grid.textContent = 'No data'; return; }
  grid.innerHTML = lines.map(line => {
    const colour = TUBE_COLOURS[line.id] || '#888';
    const sev    = line.lineStatuses?.[0]?.statusSeverity ?? 10;
    return `<div class="line-row">
      <div class="line-pill" style="background:${colour};border:1px solid rgba(255,255,255,0.15)"></div>
      <div class="line-name">${line.name}</div>
      <span class="dot ${statusClass(sev)}" style="margin:0"></span>
    </div>`;
  }).join('');
}

// ── Direction switch ──
function switchDirection() {
  currentDirection = currentDirection === 'outbound' ? 'return' : 'outbound';
  const c = cfg();

  document.getElementById('pageTitle').textContent    = c.title;
  document.getElementById('pageSubtitle').textContent = c.subtitle;
  document.getElementById('busLabel').textContent     = c.busLabel;
  document.getElementById('railCardName').textContent = c.railName;
  document.getElementById('directionBtn').title =
    currentDirection === 'outbound' ? 'Switch to Return' : 'Switch to Outbound';

  // Reset bus & delay state
  currentBuses = []; previousTimes = []; changeHistory = []; consecutiveNoDecrease = 0;
  vehiclesStillBeforeCheckpoint = new Set();
  delayState.rail = null; delayState.northern = null; delayState.victoria = null;
  updateDelayBanner();

  // Reset statuses
  ['railStatus','northernStatus','victoriaStatus'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '<span class="dot dot-minor"></span>Checking…';
  });
  ['railDesc','northernDesc','victoriaDesc'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = '';
  });

  // Update rail card link immediately
  document.getElementById('railCard').href = c.journeyCheck;

  loadBus();
  loadTubeAndRail();
}

// ── UI Toggles ──
document.getElementById('toggleGraphBtn').addEventListener('click', () => {
  graphVisible = !graphVisible;
  document.getElementById('graphContainer').classList.toggle('hidden', !graphVisible);
  document.getElementById('toggleGraphBtn').textContent = graphVisible ? '📉' : '📊';
});

document.getElementById('toggleLinesBtn').addEventListener('click', () => {
  allLinesVisible = !allLinesVisible;
  document.getElementById('allLinesPanel').classList.toggle('visible', allLinesVisible);
  document.getElementById('toggleLinesBtn').textContent = allLinesVisible ? '🗺' : '🗺️';
  if (allLinesVisible && window._allTubeLines) renderAllLines(window._allTubeLines);
  else if (allLinesVisible) loadTubeAndRail();
});

document.getElementById('directionBtn').addEventListener('click', switchDirection);

document.getElementById('refreshBtn').addEventListener('click', () => {
  loadBus();
  loadTubeAndRail();
});

// ── Wake Lock ──
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {}
}

// ── Init ──
initChart();
document.getElementById('pageTitle').textContent    = cfg().title;
document.getElementById('pageSubtitle').textContent = cfg().subtitle;
document.getElementById('busLabel').textContent     = cfg().busLabel;
document.getElementById('railCardName').textContent = cfg().railName;
loadBus();
loadTubeAndRail();
setInterval(loadBus, 15000);
setInterval(loadTubeAndRail, 60000);
setInterval(() => {
  if (TAPI_ID && TAPI_KEY) loadRailFromTransportAPI().catch(() => {});
  else loadRailFromTfL().catch(() => {});
}, 5 * 60 * 1000);
requestWakeLock();
document.addEventListener('visibilitychange', () => { if (!document.hidden) requestWakeLock(); });
</script>
