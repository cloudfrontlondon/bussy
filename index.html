<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>413 – Parkway</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: -apple-system, system-ui;
  background: #000;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 20px;
}
h1 { font-size: 22px; margin-bottom: 20px; }
.bus {
  font-size: 40px;
  margin: 15px 0;
}
.small {
  color: #aaa;
  font-size: 14px;
}
button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
  background-color: #007ACC;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
button:hover {
  background-color: #005f99;
}
</style>
</head>

<body>

<h1>Parkway → Morden (413)</h1>
<div id="buses">Loading…</div>
<button id="startButton">Start</button>

<script>
const stop = "490010849N";
const url = `https://api.tfl.gov.uk/StopPoint/${stop}/Arrivals`;

// Load sound for the beep
const beep = new Audio("https://www.soundjay.com/button/beep-07.wav");
beep.load(); // Preload the audio

let intervalId = null; // Store the interval ID

// Prevent Screen Lock
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      wakeLock = await navigator.wakeLock.request("screen");
      console.log("Wake lock is active.");
    } else {
      console.log("Wake Lock API is not supported in this browser.");
    }
  } catch (err) {
    console.error("Failed to acquire wake lock:", err);
  }
}

async function load() {
  const r = await fetch(url);
  const data = await r.json();

  const buses = data
    .filter(b => b.lineName === "413")
    .sort((a, b) => a.timeToStation - b.timeToStation)
    .slice(0, 3);

  let html = "";

  let shouldBeep = false; // Track if we should beep

  buses.forEach(bus => {
    const min = Math.round(bus.timeToStation / 60);
    html += `<div class="bus">${min} min</div>`;
    if (min < 5) {
      shouldBeep = true;
    }
  });

  if (shouldBeep) {
    beep.play().catch(err => console.error("Error playing beep:", err)); // Handle autoplay blocking errors
  }

  html += `<div class="small">Updated ${new Date().toLocaleTimeString()}</div>`;

  document.getElementById("buses").innerHTML = html;
}

// Add event listener to the button
document.getElementById("startButton").addEventListener("click", () => {
  // Hide the start button
  document.getElementById("startButton").style.display = "none";

  // Request wake lock
  requestWakeLock();

  // Start loading data
  load();
  intervalId = setInterval(load, 15000);
});

// Stop the interval if the page is hidden
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    clearInterval(intervalId); // Stop refreshing if the page is hidden
    console.log("Stopped data refresh because the page is hidden.");
  } else {
    requestWakeLock(); // Re-acquire the wake lock
    load(); // Load instantly once the page is back in focus
    intervalId = setInterval(load, 15000);
  }
});
</script>

</body>
</html>
