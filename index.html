<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>413 – Parkway</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  font-family: -apple-system, system-ui;
  background: #000;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 20px;
  padding-bottom: 200px;
  transition: background-color 0.8s ease;
  position: relative;
  min-height: 100vh;
}
h1 { 
  font-size: 24px; 
  margin-bottom: 10px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 10px;
}
.bus-line {
  margin: 20px 0;
}
.bus {
  font-size: 48px;
  font-weight: bold;
}
.change-markers {
  margin-top: 6px;
  display: flex;
  justify-content: center;
  gap: 6px;
  min-height: 28px;
}
.marker {
  width: 28px;
  height: 28px;
  line-height: 28px;
  font-size: 18px;
  border-radius: 6px;
  text-align: center;
  font-weight: bold;
}
.marker.same   { background: #444; color: #aaa; }
.marker.up     { background: #8B0000; color: #fff; }
.marker.down   { background: #006400; color: #fff; }
.small {
  color: #aaa;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}
.location, .error-msg {
  margin-top: 8px;
  font-size: 13px;
  color: #ccc;
}
.error-msg { color: #ff6666; }
button {
  margin: 12px 8px;
  padding: 10px 20px;
  font-size: 16px;
  background-color: #007ACC;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
button:hover { background-color: #005f99; }

/* Colors */
.bg-red    { background-color: #8B0000; }
.bg-amber  { background-color: #FF8C00; }
.bg-green  { background-color: #006400; }

/* Icons & progress */
.icon { width: 32px; height: 32px; }
.progress-container {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: rgba(255,255,255,0.15);
  z-index: 10;
}
.progress-bar {
  height: 100%;
  width: 100%;
  background: rgba(255,255,255,0.7);
  transform-origin: left;
  animation: countdown 15s linear forwards;
}
@keyframes countdown {
  from { transform: scaleX(1); }
  to   { transform: scaleX(0); }
}

/* Graph */
#graphContainer {
  position: fixed;
  bottom: 20px;
  left: 10px;
  right: 10px;
  height: 160px;
  background: rgba(0,0,0,0.6);
  border-radius: 8px;
  padding: 10px;
  box-sizing: border-box;
}
</style>
</head>

<body class="bg-red">

<svg class="icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="fill:#ff0000;">
  <path d="M480 192H32c-17.7 0-32 14.3-32 32v96c0 17.7 14.3 32 32 32h448c17.7 0 32-14.3 32-32v-96c0-17.7-14.3-32-32-32zM96 352c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32zm320 0c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32zM480 96H32C14.3 96 0 110.3 0 128v32c0 17.7 14.3 32 32 32h448c17.7 0 32-14.3 32-32v-32c0-17.7-14.3-32-32-32z"/>
  <rect x="64" y="64" width="384" height="128" fill="#ffffff"/>
</svg>

<h1>Parkway → Morden (413)</h1>

<div id="buses">Loading…</div>
<div id="location" class="location">Stop location: Loading…</div>
<div id="errorMsg" class="error-msg"></div>

<button id="refreshBtn">Refresh Now</button>

<div id="graphContainer">
  <canvas id="etaChart"></canvas>
</div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script>
let etaChart;
const etaHistory = [];
const MAX_POINTS = 20;
let countdownInterval = null;
let currentBuses = [];
let previousTimes = [];
let changeHistory = []; // array of {symbol, class} objects, newest at the end

function initChart() {
  const ctx = document.getElementById('etaChart').getContext('2d');
  etaChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{
      label: 'Nearest bus ETA (seconds)',
      data: [],
      borderColor: '#4CAF50',
      backgroundColor: 'rgba(76,175,80,0.2)',
      tension: 0.3,
      fill: true,
      pointRadius: 4,
    }]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, title: {display:true, text:'Seconds', color:'#fff'}, ticks:{color:'#aaa'} },
        x: { title: {display:false}, ticks: {color:'#aaa', maxTicksLimit:8} }
      },
      plugins: { legend: {labels:{color:'#fff'}} }
    }
  });
}

function updateChart(seconds) {
  if (seconds === null) return;
  etaHistory.push({ time: new Date(), seconds });
  if (etaHistory.length > MAX_POINTS) etaHistory.shift();

  etaChart.data.labels = etaHistory.map(h => Math.round(h.seconds / 60) + (Math.round(h.seconds / 60) === 1 ? ' min' : ' min'));
  etaChart.data.datasets[0].data = etaHistory.map(h => h.seconds);
  etaChart.update();
}

function formatTime(seconds) {
  if (seconds < 0) return "Due";
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins} min ${secs.toString().padStart(2,'0')} s`;
}

function getChangeMarker(delta) {
  if (delta > 0) return {symbol: '↑', class: 'up'};
  if (delta < 0) return {symbol: '↓', class: 'down'};
  return {symbol: '→', class: 'same'};
}

function renderBusesWithMarkers() {
  let html = "";
  let nextSeconds = null;

  currentBuses.forEach((bus, i) => {
    const timeStr = formatTime(bus.timeToStation);
    let markersHtml = "";

    // Show change history only under the nearest bus (index 0)
    if (i === 0 && changeHistory.length > 0) {
      markersHtml = '<div class="change-markers">';
      // Show up to the last 10 (most recent on right)
      changeHistory.slice(-10).forEach(ch => {
        markersHtml += `<span class="marker ${ch.class}">${ch.symbol}</span>`;
      });
      markersHtml += '</div>';
    }

    html += `<div class="bus-line">
      <div class="bus">${timeStr}</div>
      ${markersHtml}
    </div>`;

    if (nextSeconds === null || bus.timeToStation < nextSeconds) nextSeconds = bus.timeToStation;
  });

  if (currentBuses.length === 0) {
    html = '<div class="bus">No 413 buses scheduled right now</div>';
  }

  document.getElementById("buses").innerHTML = html;
  updateBackground(nextSeconds);
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    currentBuses = currentBuses.map(b => ({
      timeToStation: Math.max(0, b.timeToStation - 1)
    }));
    renderBusesWithMarkers();
  }, 1000);
}

function resetProgressBar() {
  const bar = document.getElementById("progressBar");
  bar.style.animation = 'none';
  void bar.offsetWidth;
  bar.style.animation = 'countdown 15s linear forwards';
}

const url = `https://api.tfl.gov.uk/StopPoint/490010849N/Arrivals`;

let wakeLock = null;
async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen");
  } catch (err) {}
}

function updateBackground(nextSeconds) {
  document.body.classList.remove("bg-red","bg-amber","bg-green");
  if (nextSeconds == null || nextSeconds > 360) document.body.classList.add("bg-red");
  else if (nextSeconds >= 270 && nextSeconds <= 360) document.body.classList.add("bg-amber");
  else document.body.classList.add("bg-green");
}

async function load() {
  document.getElementById("errorMsg").textContent = "";
  resetProgressBar();

  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`API ${r.status}`);
    const data = await r.json();

    const buses = data
      .filter(b => b.lineName === "413")
      .sort((a, b) => a.timeToStation - b.timeToStation)
      .slice(0, 3);

    // Delta calculation for nearest bus
    let newChange = null;
    if (buses.length > 0 && previousTimes.length > 0) {
      const oldNearest = previousTimes[0];
      const newNearest = buses[0].timeToStation;
      const delta = newNearest - oldNearest;
      newChange = getChangeMarker(delta);
      changeHistory.push(newChange);
      // Keep only the last 10
      if (changeHistory.length > 10) changeHistory.shift();
    } else if (buses.length > 0) {
      changeHistory = [];
    }

    previousTimes = buses.map(b => b.timeToStation);

    currentBuses = buses.map(b => ({ timeToStation: b.timeToStation }));

    let lat = data.length > 0 ? data[0].latitude?.toFixed(6) : null;
    let lon = data.length > 0 ? data[0].longitude?.toFixed(6) : null;
    document.getElementById("location").textContent = 
      lat && lon ? `Stop location: ${lat}, ${lon}` : "Stop location: Not available";

    renderBusesWithMarkers();
    updateChart(buses.length > 0 ? buses[0].timeToStation : null);
    startCountdown();

  } catch (err) {
    document.getElementById("buses").innerHTML = "Error loading arrivals";
    document.getElementById("location").textContent = "Stop location: Unknown";
    document.getElementById("errorMsg").textContent = `Failed: ${err.message}`;
  }
}

initChart();
load();
setInterval(load, 15000);

document.getElementById("refreshBtn").addEventListener("click", load);

requestWakeLock();
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) requestWakeLock();
});
</script>
</body>
</html>
