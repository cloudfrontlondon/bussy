<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>413 – Parkway</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: -apple-system, system-ui;
  background: #000;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 20px;
}
h1 { font-size: 22px; margin-bottom: 20px; }
.bus {
  font-size: 40px;
  margin: 15px 0;
}
.small {
  color: #aaa;
  font-size: 14px;
}
button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
  background-color: #007ACC;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
button:hover {
  background-color: #005f99;
}
</style>
</head>

<body>

<h1>Parkway → Morden (413)</h1>
<div id="buses">Loading…</div>
<button id="soundToggleButton">Sound OFF</button>

<script>
const stop = "490010849N";
const url = `https://api.tfl.gov.uk/StopPoint/${stop}/Arrivals`;

// Load sound for the beep
const beep = new Audio("https://www.soundjay.com/button/beep-07.wav");
beep.load(); // Preload the audio

let soundEnabled = false; // Track if sound is currently enabled

// Prevent Screen Lock
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      wakeLock = await navigator.wakeLock.request("screen");
      console.log("Wake lock is active.");
    } else {
      console.log("Wake Lock API is not supported in this browser.");
    }
  } catch (err) {
    console.error("Failed to acquire wake lock:", err);
  }
}

async function load() {
  // Fetch bus data
  const r = await fetch(url);
  const data = await r.json();

  const buses = data
    .filter(b => b.lineName === "413")
    .sort((a, b) => a.timeToStation - b.timeToStation)
    .slice(0, 3);

  let html = "";

  let shouldBeep = false; // Track if we should beep

  buses.forEach(bus => {
    const min = Math.round(bus.timeToStation / 60);
    html += `<div class="bus">${min} min</div>`;
    if (min < 5) {
      shouldBeep = true;
    }
  });

  // Play sound if enabled and a bus is less than 5 minutes away
  if (soundEnabled && shouldBeep) {
    beep.play().catch(err => console.error("Error playing beep:", err)); // Handle autoplay blocking errors
  }

  html += `<div class="small">Updated ${new Date().toLocaleTimeString()}</div>`;

  document.getElementById("buses").innerHTML = html;
}

// Toggle sound on/off
document.getElementById("soundToggleButton").addEventListener("click", () => {
  soundEnabled = !soundEnabled; // Toggle sound state

  // Update button text based on sound state
  const button = document.getElementById("soundToggleButton");
  button.textContent = soundEnabled ? "Sound ON" : "Sound OFF";
});

// Automatically load and refresh data every 15 seconds
load();
setInterval(load, 15000);

// Request wake lock to prevent screen locking when page is open
requestWakeLock();
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) {
    requestWakeLock();
  }
});
</script>

</body>
</html>
