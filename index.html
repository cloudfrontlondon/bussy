<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>413 – Parkway Transit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --rail-good: #22c55e;
    --rail-minor: #f59e0b;
    --rail-major: #ef4444;
    --bg: #0a0a0f;
    --panel: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px 16px 180px;
    transition: background-color 0.8s ease;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 10px;
  }
  .title-block h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .title-block .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-btns { display: flex; gap: 6px; }
  .icon-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: #fff;
    font-size: 18px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.2s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.12); }

  /* ── Bus section ── */
  #busPanel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .bus-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    transition: color 0.5s;
  }
  .bus-secondary {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .bus-chip {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: rgba(255,255,255,0.07);
    border-radius: 6px;
    padding: 4px 8px;
    color: #ccc;
  }
  .change-markers {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .marker {
    width: 22px; height: 22px;
    line-height: 22px;
    font-size: 12px;
    border-radius: 5px;
    text-align: center;
    font-weight: bold;
  }
  .marker.same  { background: #333; color: #888; }
  .marker.up    { background: #7f1d1d; color: #fca5a5; }
  .marker.down  { background: #14532d; color: #86efac; }
  .warning { color: #ff4444; font-size: 20px; margin-left: 6px; }
  .bus-plate {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #aaa;
    letter-spacing: 2px;
    margin-top: 2px;
    min-height: 18px;
  }
  .bus-footer { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ── Rail & Tube panels ── */
  .transit-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .tube-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }
  .tube-sub {
    display: block;
    text-decoration: none;
    color: inherit;
    padding: 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    transition: background 0.2s;
  }
  .tube-sub:hover { background: rgba(255,255,255,0.09); }
  .tube-sub.card-delay {
    background: rgba(180,0,0,0.22);
    animation: cardAlarm 2s ease-in-out infinite;
  }
  .tube-sub-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    padding-left: 6px;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  .transit-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s;
    text-decoration: none;
    display: block;
    border-top-width: 4px;
  }
  .transit-card:hover { background: rgba(255,255,255,0.07); }

  /* delay state — red flash on the card */
  .transit-card.card-delay {
    background: rgba(180, 0, 0, 0.18);
    border-color: #c00;
    animation: cardAlarm 2s ease-in-out infinite;
  }
  @keyframes cardAlarm {
    0%, 100% { background: rgba(180,0,0,0.18); }
    50%       { background: rgba(220,0,0,0.32); }
  }

  .transit-card .tc-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .transit-card .tc-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.5px;
  }
  .transit-card .tc-status {
    font-size: 12px;
    margin-top: 4px;
    font-weight: 500;
  }
  .transit-card .tc-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.3;
  }

  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
  .dot-good  { background: var(--rail-good); box-shadow: 0 0 6px var(--rail-good); }
  .dot-minor { background: var(--rail-minor); box-shadow: 0 0 6px var(--rail-minor); }
  .dot-major { background: var(--rail-major); box-shadow: 0 0 6px var(--rail-major); }

  /* ── All Lines Panel ── */
  #allLinesPanel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
    display: none;
  }
  #allLinesPanel.visible { display: block; }
  .lines-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 10px;
  }
  .line-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
  }
  .line-pill {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .line-name { font-size: 12px; font-weight: 500; flex: 1; }
  .line-status-dot { font-size: 10px; }

  /* ── Rail last updated ── */
  .last-updated {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  /* ── Graph ── */
  #graphContainer {
    position: fixed;
    bottom: 16px;
    left: 10px; right: 10px;
    height: 150px;
    background: rgba(10,10,15,0.92);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    transition: opacity 0.3s, height 0.3s, padding 0.3s;
  }
  #graphContainer.hidden {
    opacity: 0; height: 0; padding: 0; pointer-events: none;
  }

  /* ── Progress bar ── */
  .progress-container {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.08);
    z-index: 10;
  }
  .progress-bar {
    height: 100%;
    width: 100%;
    background: rgba(255,255,255,0.5);
    transform-origin: left;
    animation: countdown 15s linear forwards;
  }
  @keyframes countdown {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }

  /* ── Background tints — vivid, readable from across the room ── */
  body { transition: background-color 0.4s ease; }
  body.bg-red    { background-color: #8b0000; animation: none; }
  body.bg-amber  { background-color: #b85000; animation: none; }
  body.bg-green  { background-color: #007a2a; animation: greenPulse 2s ease-in-out infinite; }
  body.bg-yellow { animation: yellowPulse 0.9s ease-in-out infinite; }

  @keyframes greenPulse {
    0%, 100% { background-color: #007a2a; }
    50%       { background-color: #00c44a; }
  }
  @keyframes yellowPulse {
    0%, 100% { background-color: #c8960a; }
    50%       { background-color: #ffe033; }
  }

  .error-msg { color: #ff6666; font-size: 12px; margin-top: 4px; }

  /* Tube line colours */
  .tube-bakerloo    { background: #894E24; }
  .tube-central     { background: #E32017; }
  .tube-circle      { background: #FFD300; }
  .tube-district    { background: #00782A; }
  .tube-hammersmith { background: #F3A9BB; }
  .tube-jubilee     { background: #A0A5A9; }
  .tube-metropolitan{ background: #9B0056; }
  .tube-northern    { background: #000000; border: 1px solid #555; }
  .tube-piccadilly  { background: #003688; }
  .tube-victoria    { background: #0098D4; }
  .tube-waterloo    { background: #95CDBA; }
  .tube-elizabeth   { background: #6950A1; }
  .tube-overground  { background: #EE7C0E; }
  .tube-dlr         { background: #00A4A7; }
</style>
</head>

<body class="bg-red">

<header>
  <div class="title-block">
    <h1>Parkway → Morden</h1>
    <div class="subtitle">413 · Live Departures</div>
  </div>
  <div class="header-btns">
    <button id="toggleLinesBtn" class="icon-btn" title="All tube lines">🗺️</button>
    <button id="toggleGraphBtn" class="icon-btn" title="Toggle graph">📊</button>
    <button id="refreshBtn" class="icon-btn" title="Refresh">🔄</button>
  </div>
</header>

<!-- Bus panel -->
<div id="busPanel">
  <div class="section-label">🚌 Bus 413 · Northbound to Morden</div>
  <div class="bus-display" id="busDisplay">–</div>
  <div id="busPlate" class="bus-plate"></div>
  <div class="bus-secondary" id="busSecondary"></div>
  <div class="change-markers" id="changeMarkers"></div>
  <div class="bus-footer" id="busFooter"></div>
  <div class="error-msg" id="busError"></div>
</div>

<!-- Tube + Rail cards -->
<div class="transit-grid">
  <a class="transit-card" id="northernCard"
     style="border-top-color: #888;"
     href="https://tfl.gov.uk/tube/stop/940GZZLUMDN/morden-underground-station"
     target="_blank" rel="noopener">
    <div class="tc-label">🚇 Northern Line</div>
    <div class="tc-name">Morden Branch</div>
    <div class="tc-status" id="northernStatus"><span class="dot dot-minor"></span>Checking…</div>
    <div class="tc-desc" id="northernDesc"></div>
  </a>
  <a class="transit-card" id="victoriaCard"
     style="border-top-color: #0098D4;"
     href="https://tfl.gov.uk/tube/line/victoria/status"
     target="_blank" rel="noopener">
    <div class="tc-label">🚇 Victoria Line</div>
    <div class="tc-name">Victoria</div>
    <div class="tc-status" id="victoriaStatus"><span class="dot dot-minor"></span>Checking…</div>
    <div class="tc-desc" id="victoriaDesc"></div>
  </a>
  <a class="transit-card" id="railCard"
     style="border-top-color: #e05206;"
     href="https://www.nationalrail.co.uk/service-disruptions/"
     target="_blank" rel="noopener">
    <div class="tc-label">🚆 SW Rail</div>
    <div class="tc-name">Raynes Pk → Waterloo</div>
    <div class="tc-status" id="railStatus"><span class="dot dot-minor"></span>Checking…</div>
    <div class="tc-desc" id="railDesc"></div>
  </a>
  <div style="display:flex;align-items:flex-end;">
    <div class="last-updated" id="railUpdated">Rail/Tube: never updated</div>
  </div>
</div>

<!-- All lines toggle panel -->
<div id="allLinesPanel">
  <div class="section-label">All TfL Lines</div>
  <div class="lines-grid" id="linesGrid">Loading…</div>
</div>

<!-- Graph -->
<div id="graphContainer">
  <canvas id="etaChart"></canvas>
</div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script>
// ── Constants ──
const BUS_STOP = '490010849N';
const BUS_URL  = `https://api.tfl.gov.uk/StopPoint/${BUS_STOP}/Arrivals`;
const TUBE_LINES_URL = 'https://api.tfl.gov.uk/Line/Mode/tube/Status';
// TfL correct ID for South Western Railway is 'south-western-railway'
const SW_RAIL_URL = 'https://api.tfl.gov.uk/Line/south-western-railway/Status';

// Tube line colours for pill
const TUBE_COLOURS = {
  'bakerloo':           '#894E24',
  'central':            '#E32017',
  'circle':             '#FFD300',
  'district':           '#00782A',
  'hammersmith-city':   '#F3A9BB',
  'jubilee':            '#A0A5A9',
  'metropolitan':       '#9B0056',
  'northern':           '#333333',
  'piccadilly':         '#003688',
  'victoria':           '#0098D4',
  'waterloo-city':      '#95CDBA',
  'elizabeth':          '#6950A1',
  'overground':         '#EE7C0E',
  'dlr':                '#00A4A7',
};

// ── State ──
let etaHistory = [], etaChart;
const MAX_POINTS = 20;
let countdownInterval = null;
let currentBuses = [];
let previousTimes = [];
let changeHistory = [];
let consecutiveNoDecrease = 0;
let graphVisible = true;
let allLinesVisible = false;

// ── Chart ──
function initChart() {
  const ctx = document.getElementById('etaChart').getContext('2d');
  etaChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Bus ETA (s)',
        data: [],
        borderColor: '#4ade80',
        backgroundColor: 'rgba(74,222,128,0.15)',
        tension: 0.4, fill: true, pointRadius: 3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, ticks: { color: '#666' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        x: { ticks: { color: '#666', maxTicksLimit: 7 }, grid: { display: false } }
      },
      plugins: { legend: { labels: { color: '#888', font: { size: 11 } } } }
    }
  });
}

function updateChart(seconds) {
  if (seconds === null) return;
  const now = new Date();
  etaHistory.push({ t: now, s: seconds });
  if (etaHistory.length > MAX_POINTS) etaHistory.shift();
  etaChart.data.labels = etaHistory.map(h => {
    const m = Math.floor(h.s / 60);
    return m + 'm';
  });
  etaChart.data.datasets[0].data = etaHistory.map(h => h.s);
  etaChart.update();
}

// ── Helpers ──
function formatTime(seconds) {
  if (seconds <= 0) return "Due";
  const m = Math.floor(seconds / 60), s = seconds % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function getChangeMarker(delta) {
  if (delta > 0) return { symbol: '↑', cls: 'up' };
  if (delta < 0) return { symbol: '↓', cls: 'down' };
  return { symbol: '→', cls: 'same' };
}

function updateBackground(nextSeconds) {
  document.body.classList.remove("bg-red","bg-amber","bg-green","bg-yellow");
  if (nextSeconds == null || nextSeconds > 360) document.body.classList.add("bg-red");
  else if (nextSeconds < 120)                   document.body.classList.add("bg-yellow");
  else if (nextSeconds >= 270)                  document.body.classList.add("bg-amber");
  else                                           document.body.classList.add("bg-green");
}

function statusClass(severityCode) {
  // TfL severity: 10 = Good, 0/1/2 = Suspended, others = disruption
  if (severityCode === 10) return 'dot-good';
  if (severityCode <= 3)   return 'dot-major';
  return 'dot-minor';
}
function statusText(severity) {
  if (severity === 10) return 'Good service';
  if (severity <= 3)   return 'Severe disruption';
  return 'Minor delays';
}

// ── Bus Load ──
function resetProgressBar() {
  const bar = document.getElementById("progressBar");
  bar.style.animation = 'none';
  void bar.offsetWidth;
  bar.style.animation = 'countdown 15s linear forwards';
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    currentBuses = currentBuses.map(b => ({ timeToStation: Math.max(0, b.timeToStation - 1) }));
    renderBuses();
  }, 1000);
}

function renderBuses() {
  const next = currentBuses.length > 0 ? currentBuses[0].timeToStation : null;

  document.getElementById('busDisplay').textContent = next !== null ? formatTime(next) : '–';

  // plate under the main timer
  const plateEl = document.getElementById('busPlate');
  if (plateEl) plateEl.textContent = currentBuses.length > 0 && currentBuses[0].vehicleId
    ? currentBuses[0].vehicleId : '';

  // secondary chips
  const sec = document.getElementById('busSecondary');
  sec.innerHTML = currentBuses.slice(1).map(b =>
    `<span class="bus-chip">${formatTime(b.timeToStation)}${b.vehicleId ? ' · <span style="opacity:0.6;font-size:11px">' + b.vehicleId + '</span>' : ''}</span>`
  ).join('');

  // change markers
  const cm = document.getElementById('changeMarkers');
  cm.innerHTML = changeHistory.slice(-10).map(ch =>
    `<span class="marker ${ch.cls}">${ch.symbol}</span>`
  ).join('');
  if (consecutiveNoDecrease >= 8) cm.innerHTML += '<span class="warning">⚠️</span>';

  // footer
  document.getElementById('busFooter').textContent =
    currentBuses.length === 0 ? 'No 413 buses scheduled right now' :
    currentBuses.length === 1 ? '1 bus tracked' :
    `+${currentBuses.length - 1} following`;

  updateBackground(next);
}

async function loadBus() {
  resetProgressBar();
  document.getElementById('busError').textContent = '';
  try {
    const r = await fetch(BUS_URL);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    const buses = data
      .filter(b => b.lineName === '413')
      .sort((a,b) => a.timeToStation - b.timeToStation)
      .slice(0, 3);

    if (buses.length > 0 && previousTimes.length > 0) {
      const delta = buses[0].timeToStation - previousTimes[0];
      const ch = getChangeMarker(delta);
      changeHistory.push(ch);
      if (changeHistory.length > 10) changeHistory.shift();
      consecutiveNoDecrease = delta > 0 ? consecutiveNoDecrease + 1 : 0;
    } else {
      changeHistory = []; consecutiveNoDecrease = 0;
    }
    previousTimes = buses.map(b => b.timeToStation);
    currentBuses  = buses.map(b => ({ timeToStation: b.timeToStation, vehicleId: b.vehicleId }));

    renderBuses();
    updateChart(buses.length > 0 ? buses[0].timeToStation : null);
    startCountdown();
  } catch(err) {
    document.getElementById('busError').textContent = `Bus error: ${err.message}`;
  }
}

// ── Tube & Rail Load ──
function renderLineStatus(statusId, descId, severity, desc, cardId) {
  const el = document.getElementById(statusId);
  const dc = document.getElementById(descId);
  const card = cardId ? document.getElementById(cardId) : null;
  if (!el) return;
  const cls = statusClass(severity);
  const txt = statusText(severity);
  el.innerHTML = `<span class="dot ${cls}"></span>${txt}`;
  if (dc) dc.textContent = desc || '';
  // flash card/sub red if any disruption
  if (card) card.classList.toggle('card-delay', severity < 10);
}

async function loadTubeAndRail() {
  try {
    // Tube lines
    const r = await fetch(TUBE_LINES_URL);
    if (!r.ok) throw new Error('Tube API ' + r.status);
    const lines = await r.json();

    // Northern
    const northern = lines.find(l => l.id === 'northern');
    if (northern && northern.lineStatuses?.length) {
      const s = northern.lineStatuses[0];
      const disruptionDesc = s.disruption?.description || '';
      // shorten desc for card
      const short = disruptionDesc.length > 80 ? disruptionDesc.slice(0,80) + '…' : disruptionDesc;
      renderLineStatus('northernStatus', 'northernDesc', s.statusSeverity, short, 'northernCard');
      // update link if disruption
      if (s.statusSeverity < 10) {
        document.getElementById('northernCard').href =
          'https://tfl.gov.uk/tube/line/northern/status';
      }
    }

    // Victoria
    const victoria = lines.find(l => l.id === 'victoria');
    if (victoria && victoria.lineStatuses?.length) {
      const s = victoria.lineStatuses[0];
      const disruptionDesc = s.disruption?.description || '';
      const short = disruptionDesc.length > 80 ? disruptionDesc.slice(0,80) + '…' : disruptionDesc;
      renderLineStatus('victoriaStatus', 'victoriaDesc', s.statusSeverity, short, 'victoriaCard');
      if (s.statusSeverity < 10) {
        document.getElementById('victoriaCard').href =
          'https://tfl.gov.uk/tube/line/victoria/status';
      }
    }

    // All lines panel
    if (allLinesVisible) renderAllLines(lines);
    window._allTubeLines = lines; // cache

  } catch(err) {
    ['northernStatus','victoriaStatus'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = `<span class="dot dot-minor"></span>Unavailable`;
    });
  }

  // SW Rail — direct call for south-western-railway line
  try {
    const r2 = await fetch(SW_RAIL_URL);
    if (!r2.ok) throw new Error('Rail API ' + r2.status);
    const railData = await r2.json();

    // railData is an array (single line), get first item's status
    const line = Array.isArray(railData) ? railData[0] : railData;
    const s = line?.lineStatuses?.[0];
    const severity = s?.statusSeverity ?? 10;
    const desc = s?.disruption?.description || s?.statusSeverityDescription || '';
    const short = desc.length > 90 ? desc.slice(0,90) + '…' : desc;

    renderLineStatus('railStatus', 'railDesc', severity, short, 'railCard');

    document.getElementById('railCard').href = severity < 10
      ? 'https://www.journeycheck.com/swr/'
      : 'https://www.realtimetrains.co.uk/search/detailed/gb-nr:RAY/' +
        new Date().toISOString().slice(0,10).replace(/-/g,'/') + '/1200/';

  } catch(err) {
    // Fallback: link to JourneyCheck SWR
    document.getElementById('railStatus').innerHTML =
      `<span class="dot dot-minor"></span>Tap to check`;
    document.getElementById('railDesc').textContent = 'Could not load automatically';
    document.getElementById('railCard').href = 'https://www.journeycheck.com/swr/';
  }

  document.getElementById('railUpdated').textContent =
    'Rail/Tube: ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

// ── All Lines Panel ──
function renderAllLines(lines) {
  const grid = document.getElementById('linesGrid');
  if (!lines || !lines.length) { grid.textContent = 'No data'; return; }

  grid.innerHTML = lines.map(line => {
    const colour = TUBE_COLOURS[line.id] || '#888';
    const sev = line.lineStatuses?.[0]?.statusSeverity ?? 10;
    const dotCls = statusClass(sev);
    return `<div class="line-row">
      <div class="line-pill" style="background:${colour};border:1px solid rgba(255,255,255,0.15)"></div>
      <div class="line-name">${line.name}</div>
      <span class="dot ${dotCls}" style="margin:0"></span>
    </div>`;
  }).join('');
}

// ── UI Toggles ──
document.getElementById('toggleGraphBtn').addEventListener('click', () => {
  graphVisible = !graphVisible;
  document.getElementById('graphContainer').classList.toggle('hidden', !graphVisible);
  document.getElementById('toggleGraphBtn').textContent = graphVisible ? '📉' : '📊';
});

document.getElementById('toggleLinesBtn').addEventListener('click', () => {
  allLinesVisible = !allLinesVisible;
  const panel = document.getElementById('allLinesPanel');
  panel.classList.toggle('visible', allLinesVisible);
  document.getElementById('toggleLinesBtn').textContent = allLinesVisible ? '🗺' : '🗺️';
  if (allLinesVisible && window._allTubeLines) renderAllLines(window._allTubeLines);
  else if (allLinesVisible) loadTubeAndRail();
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  loadBus();
  loadTubeAndRail();
});

// ── Wake Lock ──
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
  } catch(e) {}
}

// ── Init ──
initChart();
loadBus();
loadTubeAndRail();
setInterval(loadBus, 15000);
setInterval(loadTubeAndRail, 60000);
requestWakeLock();
document.addEventListener('visibilitychange', () => { if (!document.hidden) requestWakeLock(); });
</script>
</body>
</html>
